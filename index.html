<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeffrey Kim — A Capsule</title>
<meta name="description" content="The capsule of Jeffrey Kim — analyst, poet, builder. Work, writing, and pursuits, archived while they happen.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=Albert+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- ══════════════════════════════════════════════════════════════════
     THE CAPSULE v3 — HOW TO EDIT
     ══════════════════════════════════════════════════════════════════
     ALL content lives in the CONTENT object (search "const CONTENT").

       CONTENT.cover            → landing page
       CONTENT.work             → experience, projects, toolkit, education
       CONTENT.writing.essays   → essays   (add objects to the array)
       CONTENT.writing.poems    → poems    (add objects to the array)
       CONTENT.pursuits         → fitness / guitar / piano journeys
       CONTENT.contact          → contact rows

     Entries marked [SAMPLE] show the format — replace and delete tag.

     PUBLISHING: repo named  yourusername.github.io  → upload this file
     as index.html + Jeffrey_Kim_Resume.pdf → done.

     ⚠ SEG work is described without deal-target names or financials.
     ⚠ For Columbia admissions essays, prefer excerpts over full text.
     ══════════════════════════════════════════════════════════════════ -->

<style>
:root{
  --abyss:#F1F4EC;
  --deep:#FBFCF8;
  --pane:#FDFDFA;
  --pane-2:#F5F7F0;
  --line:#C7D4C6;
  --line-soft:#DAE4D6;
  --mist:#47594D;
  --fog:#22332A;
  --bone:#101B14;
  --accent:#17694E;
  --accent-dim:#3D7A5F;
  --jade:#BFD4C2;
  --maxw:1040px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation:none!important;transition:none!important}
}
body{
  font-family:'Newsreader',Georgia,serif;font-weight:300;
  line-height:1.65;font-size:17px;color:var(--fog);background:var(--abyss);
}
::selection{background:var(--accent);color:var(--abyss)}
a{color:inherit;text-decoration:none}
button{font:inherit;background:none;border:none;cursor:pointer;color:inherit}
a:focus-visible,button:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px}
.sans{font-family:'Albert Sans',system-ui,sans-serif}

/* ── Generative background ───────────────────────────────────────── */
#bg{position:fixed;inset:0;z-index:-2;background:var(--abyss);transition:opacity .6s ease,filter .6s ease}
body.inner #bg{opacity:.22;filter:saturate(.75)}
#bg-glow{
  position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(900px 620px at 74% 16%, rgba(255,250,235,.75), transparent 60%),
    linear-gradient(180deg, rgba(226,236,244,.35) 0%, transparent 45%),
    linear-gradient(180deg, transparent 52%, rgba(243,246,238,.85) 100%);
}

/* ── Reveals & micro-motion ──────────────────────────────────────── */
.rv{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s cubic-bezier(.2,.8,.2,1)}
.rv.rv-in{opacity:1;transform:none}
.bigname .ch{animation:rise .8s cubic-bezier(.2,.8,.2,1) backwards}
@keyframes rise{from{opacity:0;transform:translateY(.35em)}to{opacity:1;transform:none}}
.navlink{position:relative}
.navlink::after{content:"";position:absolute;left:12px;right:100%;bottom:4px;height:1px;background:var(--accent);transition:right .25s ease}
.navlink:hover::after{right:12px}
.navlink.on::after{display:none}

/* ── Appa flyer ──────────────────────────────────────────────────── */
#flyer{position:fixed;left:0;top:0;z-index:0;pointer-events:none;will-change:transform}
#flyer-flip{transition:transform .7s ease}
#flyer-inner{position:relative;filter:drop-shadow(0 18px 34px rgba(30,50,40,.22));will-change:transform}
#flyer-appa{display:block;width:var(--flyer-w,170px)}
#flyer-rider{
  position:absolute;overflow:hidden;border-radius:50%;
  border:2px solid rgba(255,255,255,.9);
  box-shadow:0 4px 14px rgba(30,50,40,.25), 0 0 0 3px rgba(255,255,255,.4);
}
#flyer-rider img{width:100%;height:100%;object-fit:cover;display:block}
#flyer.cutout #flyer-rider{border-radius:0;border:none;box-shadow:none;overflow:visible}
#flyer.static{left:auto;right:44px;top:110px}
@media (max-width:900px){#flyer{--flyer-w:135px}}
main,footer{position:relative;z-index:1}

/* ── Loader ──────────────────────────────────────────────────────── */
#loader{
  position:fixed;inset:0;z-index:100;background:var(--abyss);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  cursor:pointer;transition:opacity .7s ease, visibility .7s;
}
#loader.done{opacity:0;visibility:hidden;pointer-events:none}
#loader .word{
  font-family:'Fraunces',serif;font-weight:300;font-style:italic;
  font-size:clamp(26px,4vw,44px);color:var(--bone);letter-spacing:.02em;
}
#loader .word .accent{color:var(--accent);font-style:normal}
#loader .bar{width:min(300px,60vw);height:1px;background:var(--line);position:relative;overflow:visible}
#loader .bar i{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--accent);box-shadow:0 0 12px rgba(23,105,78,.45)}
#loader .pct{font-family:'Albert Sans',sans-serif;font-size:11px;letter-spacing:.32em;color:var(--mist)}
#loader .skip{font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.3em;color:var(--line);text-transform:uppercase;margin-top:10px}

/* ── Top nav ─────────────────────────────────────────────────────── */
#topnav{
  position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:6px;
  padding:16px 30px;border-bottom:1px solid var(--line-soft);
  background:rgba(250,251,248,.8);backdrop-filter:blur(10px);
}
#topnav .brand{font-family:'Albert Sans',sans-serif;font-size:12px;font-weight:700;color:var(--bone);margin-right:auto;letter-spacing:.42em}
#topnav .brand b{color:var(--accent);font-weight:400}
.navlink{
  font-family:'Albert Sans',sans-serif;font-size:11.5px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;padding:7px 13px;color:var(--mist);
  border:1px solid transparent;border-radius:2px;transition:all .18s;
}
.navlink:hover{color:var(--bone);border-color:var(--line)}
.navlink.on{color:var(--abyss);background:var(--accent);border-color:var(--accent);font-weight:600}

/* ── Cover ───────────────────────────────────────────────────────── */
#cover{min-height:calc(100vh - 58px);display:flex;flex-direction:column;padding:34px 30px 0;max-width:1500px;margin:0 auto;width:100%}
.manifest{
  display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;
  font-family:'Albert Sans',sans-serif;font-size:11.5px;font-weight:500;letter-spacing:.2em;
  color:var(--fog);text-transform:uppercase;margin-bottom:10px;
}
.manifest .live{color:var(--accent)}
.meter{
  font-family:'Albert Sans',sans-serif;font-size:11.5px;letter-spacing:.22em;
  color:var(--line);white-space:nowrap;overflow:hidden;user-select:none;
  padding:11px 0;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);
}
.meter .up{color:#4CBE93}.meter .dn{color:#6E7D75}.meter .scan{color:#3A5147}
.bigname{
  font-family:'Gloock',serif;font-weight:400;
  font-size:clamp(62px,12.5vw,186px);line-height:.95;letter-spacing:-.015em;
  margin:auto 0 10px;padding-top:36px;user-select:none;color:var(--bone);
}
.bigname .ln{display:block}
.bigname .ch{display:inline-block;transition:transform .25s cubic-bezier(.2,.8,.2,1), color .3s;will-change:transform}
.bigname .ch:hover{color:var(--accent)}
.roleline{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:clamp(16px,2vw,22px);color:var(--mist);margin-bottom:28px;
}
.roleline b{color:var(--accent);font-weight:400;border-bottom:1px solid var(--accent-dim);padding-bottom:1px}
.coverbio{max-width:560px;font-size:19px;color:var(--fog);margin-bottom:46px;font-weight:300}
.coverbio .hi{font-family:'Fraunces',serif;font-style:italic;color:var(--bone)}

.index{border-top:1px solid var(--line-soft);margin-bottom:40px}
.index-head{
  font-family:'Albert Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.3em;
  color:var(--accent);text-transform:uppercase;padding:16px 2px 6px;
}
.idx{
  display:grid;grid-template-columns:96px 1fr auto 30px;gap:20px;align-items:baseline;
  width:100%;text-align:left;padding:17px 2px;border-bottom:1px solid var(--line-soft);
  transition:padding-left .25s, background .25s;
}
.idx:hover{padding-left:18px;background:rgba(47,169,125,.045)}
.idx .code{font-family:'Albert Sans',sans-serif;font-size:12.5px;font-weight:600;color:var(--accent);letter-spacing:.24em}
.idx .name{font-family:'Gloock',serif;font-weight:400;font-size:clamp(28px,3.7vw,45px);line-height:1.04;color:var(--bone);-webkit-text-stroke:.5px currentColor}
.idx .count{font-family:'Albert Sans',sans-serif;font-size:13px;font-weight:600;color:var(--fog);letter-spacing:.18em;text-transform:uppercase}
.idx .arrow{color:var(--mist);transition:transform .25s,color .25s;font-family:'Albert Sans',sans-serif}
.idx:hover .arrow{transform:translateX(7px);color:var(--accent)}

.marq{overflow:hidden;border-top:1px solid var(--line-soft);padding:13px 0 17px;white-space:nowrap;user-select:none}
.marq .inner{display:inline-block;font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:19px;color:var(--mist);animation:slide 30s linear infinite}
@keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@media (prefers-reduced-motion:reduce){.marq .inner{animation:none}}

/* ── Interior shared ─────────────────────────────────────────────── */
.page{max-width:var(--maxw);margin:0 auto;padding:66px 30px 96px}
.sec-head{display:flex;align-items:baseline;gap:20px;margin-bottom:12px;border-bottom:1px solid var(--line);padding-bottom:16px}
.sec-stage{font-family:'Albert Sans',sans-serif;font-size:11.5px;font-weight:600;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;white-space:nowrap}
.sec-title{font-family:'Gloock',serif;font-weight:400;font-size:clamp(34px,4.8vw,54px);line-height:1;color:var(--bone)}
.sec-note{font-family:'Albert Sans',sans-serif;font-size:11px;letter-spacing:.2em;color:var(--mist);margin-left:auto;white-space:nowrap;text-transform:uppercase}
.sec-intro{max-width:640px;color:var(--mist);margin:18px 0 44px;font-size:17px}
.subhead{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:26px;color:var(--bone);
  margin:64px 0 6px;
}
.subhead-rule{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.subhead-rule .tag{font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.28em;color:var(--accent-dim);text-transform:uppercase;white-space:nowrap}
.subhead-rule i{flex:1;height:1px;background:var(--line-soft)}
.sample{font-family:'Albert Sans',sans-serif;font-size:9px;color:var(--abyss);background:var(--accent);padding:2px 9px;letter-spacing:.2em;vertical-align:middle;border-radius:2px;font-weight:600}

/* work */
.role{border:1px solid var(--line);background:var(--pane);padding:30px 32px;margin-bottom:22px;position:relative;border-radius:3px}
.role::before{content:attr(data-idx);position:absolute;top:-10px;left:24px;font-family:'Albert Sans',sans-serif;font-size:9px;letter-spacing:.24em;background:var(--abyss);border:1px solid var(--line);color:var(--accent-dim);padding:2px 12px;border-radius:2px}
.role-top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:4px}
.role h3{font-family:'Fraunces',serif;font-weight:400;font-size:25px;color:var(--bone)}
.role .org{color:var(--accent);font-style:italic;font-weight:300}
.role .dates{font-family:'Albert Sans',sans-serif;font-size:10.5px;letter-spacing:.18em;color:var(--mist);padding-top:10px;text-transform:uppercase}
.role .summary{color:var(--mist);margin:8px 0 16px;max-width:700px}
.role ul{list-style:none}
.role li{padding:9px 0 9px 28px;position:relative;font-size:15.5px;color:var(--fog);border-top:1px solid var(--line-soft)}
.role li::before{content:"◇";position:absolute;left:2px;color:var(--accent-dim);font-size:11px;top:13px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.card{border:1px solid var(--line);background:var(--pane);padding:26px 26px 20px;position:relative;display:flex;flex-direction:column;gap:12px;border-radius:3px;transition:transform .2s, border-color .2s, box-shadow .2s}
.card:hover{transform:translateY(-4px);border-color:var(--accent-dim);box-shadow:0 14px 34px rgba(30,50,40,.14), 0 0 0 1px rgba(47,169,125,.12)}
.card .ws{font-family:'Albert Sans',sans-serif;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-dim);padding:3px 10px;width:fit-content;border-radius:2px}
.card h3{font-family:'Fraunces',serif;font-weight:400;font-size:22px;line-height:1.15;color:var(--bone)}
.card p{font-size:15px;color:var(--mist);flex:1}
.card .stack{display:flex;flex-wrap:wrap;gap:6px;padding-top:8px;border-top:1px solid var(--line-soft)}
.card .stack span{font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.14em;color:var(--mist);border:1px solid var(--line);padding:2px 9px;border-radius:2px;text-transform:uppercase}
.tools{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.toolcol{border-top:1px solid var(--accent-dim);padding-top:16px}
.toolcol h3{font-family:'Albert Sans',sans-serif;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.toolcol li{list-style:none;font-size:15px;color:var(--fog);padding:7px 0;border-bottom:1px solid var(--line-soft)}
.toolcol li:last-child{border-bottom:none}
.edu{border-left:2px solid var(--accent-dim);padding:8px 0 8px 26px;margin-bottom:18px}
.edu h3{font-family:'Fraunces',serif;font-weight:400;font-size:23px;color:var(--bone)}
.edu .meta{font-family:'Albert Sans',sans-serif;font-size:10.5px;letter-spacing:.16em;color:var(--accent);margin:4px 0 8px;text-transform:uppercase}
.edu p{font-size:15px;color:var(--mist);max-width:680px}

/* writing */
.essay{border:1px solid var(--line);background:var(--pane);margin-bottom:20px;padding:28px 30px;border-radius:3px}
.essay .meta-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:10px;font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mist)}
.essay .meta-row .code{color:var(--accent)}
.essay .meta-row .award{color:var(--accent);border:1px solid var(--accent-dim);padding:2px 9px;border-radius:2px}
.essay h3{font-family:'Fraunces',serif;font-weight:400;font-size:27px;line-height:1.15;margin-bottom:10px;color:var(--bone)}
.essay .excerpt{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:18px;color:var(--fog);border-left:2px solid var(--accent);padding-left:20px;margin:16px 0}
.essay .full{display:none;margin-top:18px;color:var(--fog);white-space:pre-wrap;border-top:1px solid var(--line-soft);padding-top:18px;font-size:16px}
.essay.open .full{display:block}
.readbtn{font-family:'Albert Sans',sans-serif;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-dim);padding:8px 16px;border-radius:2px;transition:all .18s}
.readbtn:hover{background:var(--accent);color:var(--abyss)}
.xonly{font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.24em;color:var(--mist);text-transform:uppercase}
.poem{max-width:620px;margin:0 auto 78px;scroll-margin-top:90px}
.poemtoc{
  display:grid;grid-template-columns:repeat(2,1fr);gap:0 30px;
  max-width:640px;margin:0 auto 64px;border:1px solid var(--line);
  background:var(--pane);padding:16px 26px 20px;border-radius:3px;
}
.poemlink{
  text-align:left;font-family:'Fraunces',serif;font-size:17px;color:var(--fog);
  padding:9px 2px;border-bottom:1px solid var(--line-soft);transition:color .15s;
}
.poemlink:hover{color:var(--accent)}
.poemlink .code{font-family:'Albert Sans',sans-serif;font-size:9px;letter-spacing:.18em;color:var(--accent);margin-right:9px;vertical-align:2px}
.pubrow{border:1px solid var(--line);background:var(--pane);padding:26px 28px;margin-bottom:20px;border-radius:3px}
.pubrow .meta-row{display:flex;gap:16px;flex-wrap:wrap;font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mist);margin-bottom:8px}
.pubrow .meta-row .code{color:var(--accent)}
.pubrow h3{font-family:'Fraunces',serif;font-weight:400;font-size:23px;line-height:1.25;color:var(--bone);margin-bottom:8px;max-width:720px}
.pubrow p{font-size:15px;color:var(--mist);margin-bottom:16px;max-width:700px}
.poem .meta-row{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mist);border-bottom:1px solid var(--line-soft);padding-bottom:10px;margin-bottom:24px}
.poem .meta-row .venue{color:var(--accent)}
.poem h3{font-family:'Fraunces',serif;font-weight:400;font-size:30px;margin-bottom:20px;color:var(--bone)}
.poem .verse{font-family:'Newsreader',serif;font-size:19px;line-height:1.85;white-space:pre-wrap;color:var(--fog)}
.poem .scanmark{font-family:'Albert Sans',sans-serif;color:var(--line);font-size:11px;letter-spacing:.5em;margin-top:24px;user-select:none}

/* pursuits */
.pursuit{border:1px solid var(--line);background:var(--pane);padding:30px 32px;margin-bottom:26px;border-radius:3px}
.pursuit .top{display:flex;justify-content:space-between;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.pursuit h3{font-family:'Fraunces',serif;font-weight:400;font-size:29px;color:var(--bone)}
.pursuit .since{font-family:'Albert Sans',sans-serif;font-size:10px;color:var(--accent);letter-spacing:.26em;text-transform:uppercase}
.pursuit .status{color:var(--mist);max-width:660px;margin-bottom:20px}
.statrow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.stat{border:1px solid var(--line);padding:12px 18px;min-width:112px;border-radius:3px;background:rgba(47,169,125,.03)}
.stat .v{font-family:'Fraunces',serif;font-weight:300;font-size:26px;line-height:1.1;color:var(--bone)}
.stat .k{font-family:'Albert Sans',sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--mist)}
.tl{border-left:1px solid var(--line);margin-left:6px;padding-left:26px}
.tl-item{position:relative;padding:0 0 20px}
.tl-item::before{content:"";position:absolute;left:-30.5px;top:8px;width:8px;height:8px;border-radius:50%;background:var(--abyss);border:1.5px solid var(--accent);box-shadow:0 0 8px rgba(47,169,125,.35)}
.tl-item .d{font-family:'Albert Sans',sans-serif;font-size:10px;color:var(--accent);letter-spacing:.22em;text-transform:uppercase}
.tl-item .t{font-size:15.5px;color:var(--fog)}

/* about */
.about-grid{display:grid;grid-template-columns:1.45fr 1fr;gap:48px;align-items:start}
.prose{color:var(--fog);font-size:17px;max-width:600px;margin-bottom:8px}
.portrait{
  width:100%;max-width:340px;display:block;border:1px solid var(--line);border-radius:3px;
  filter:saturate(.85) contrast(1.02);margin-bottom:26px;
  box-shadow:0 18px 44px rgba(30,50,40,.16);
  aspect-ratio:4/5;object-fit:cover;object-position:35% 22%;  /* crops the right side & top glare of the current photo */
}
.sidebox{border:1px solid var(--line);background:var(--pane);padding:22px 24px;border-radius:3px;margin-bottom:20px}
.sidebox h3{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:20px;color:var(--bone);margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chips span{font-family:'Albert Sans',sans-serif;font-size:10px;letter-spacing:.14em;color:var(--fog);border:1px solid var(--line);padding:4px 11px;border-radius:2px;text-transform:uppercase}
.chips span:hover{border-color:var(--accent-dim);color:var(--accent)}
.logrow{padding:9px 0;border-bottom:1px solid var(--line-soft)}
.logrow:last-child{border-bottom:none}
.logdate{font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.logtext{font-size:14px;color:var(--fog)}

/* contact */
.contact-big{font-family:'Gloock',serif;font-weight:400;font-size:clamp(32px,4.6vw,54px);line-height:1.14;max-width:760px;margin:22px 0 36px;color:var(--bone)}
.contact-big em{font-style:italic;color:var(--accent)}
.contact-rows{max-width:540px}
.crow{display:flex;justify-content:space-between;gap:16px;padding:15px 2px;border-bottom:1px solid var(--line-soft);font-size:16px}
.crow a{color:var(--accent);border-bottom:1px solid transparent;transition:border-color .15s}
.crow a:hover{border-bottom-color:var(--accent)}
.crow .k{font-family:'Albert Sans',sans-serif;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--mist);padding-top:5px}

footer{border-top:1px solid var(--line-soft);padding:22px 30px;background:rgba(250,251,248,.7)}
footer .in{max-width:var(--maxw);margin:0 auto;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-family:'Albert Sans',sans-serif;font-size:9.5px;color:var(--mist);letter-spacing:.18em;text-transform:uppercase}

noscript{display:block;padding:40px;color:var(--fog);font-family:monospace}

@media (max-width:900px){.grid,.tools,.about-grid,.poemtoc{grid-template-columns:1fr}}
@media (max-width:680px){
  #topnav{padding:12px 16px;flex-wrap:wrap}
  #cover{padding:24px 16px 0}
  .page{padding:48px 16px 72px}
  .idx{grid-template-columns:64px 1fr;grid-template-rows:auto auto}
  .idx .count{grid-column:2}
  .idx .arrow{display:none}
}
</style>

      { head: "hello", tag: "in my own words", body: "Hi, I’m Jeffrey Kim, a Sophomore at Columbia University studying Applied Mathematics, Economics, and Computer Science (aka the big 3). I was born in Seoul, South Korea, grew up in Troy, Michigan, and now I work and go to school in New York City.\n\nI created this website because I wanted something more tangible to motivate me throughout the summer, and because my company’s Claude plan has Fable 5. Don’t worry, I made this on my own time. I would never use work hours to do anything other than maximize shareholder value.\n\nI really want to create more coding-based projects, build more financial models, and do anything that vaguely interests me while setting me up for success.\n\nI’ve always tried to begin projects or pursuits, whether that be going to the gym to picking up the guitar to founding a highschool nonprofit just like everyone else. But I lowkey just think that I’m pretty lazy. I just rely on my ability to retain stuff to get by in my classes, and I think I’m something akin to lost potential. So I thought, might as well make this and stick with it, because something I can look at all the time is definitely a worthwhile venture.\n\nI enjoy philosophy and thinking and playing spikeball and trying new food spots and all that.\n\nI think my greatest strengths are how I can work with numbers in my head, which stems from a typical asian-american upbringing, and how I can talk to people and make new friends. Conversation, I think, is my greatest asset. If you can make someone like you, you can do anything.\n\nSo that’s why I’m interested in finance, because the industry of finance is really a ring of personal connection that somewhat values quicker thinkers and mathematical prowess. I think it suits what I’m good at, and I honestly enjoy Excel and seeing how quickly I can CtrlA AltHFA AltHFT." }

  writing: {

      {code:"FIN 001", title:"All In: A Technological Trade War",
        context:"Economics feature \u00b7 Harvard International Review", year:"2023", award:"",
        excerpt:"As the Biden Administration continues to tighten trade restrictions against China, it is safe to say that all the chips are on the table.",
        full:"Explosive developments in Artificial Intelligence (AI) technology. Cutting-edge quantum computing. The political entrenchment between the United States and China. All of these things have been fueled by the microchips of the rapidly expanding semiconductor industry, which has grown over 300% since the dawn of the 2000s. The boosted demand for these high-performance microchips is met by the mass production of the semiconductor giants of Taiwan, the United States, and South Korea.\n\nUndoubtedly, the drastic breakthroughs within the industry have brought its militaristic implications into the limelight. Following the rising tensions between China and Taiwan and tensions over the war in Ukraine, the United States has begun to take its steps to thwart China’s technological revolution — one they have invested billions of dollars into.\n\nThe Creating Helpful Incentives to Produce Semiconductors Act (CHIPS Act) was passed by Congress on August 9, 2022. The CHIPS Act allocates $52 billion to boost semiconductor production while restricting the exports and expansion of powerful semiconductors to countries that pose a national security threat. The strain placed on China’s technological industry is an effect that, according to national security advisor Jake Sullivan, will prevent China from “undermining American national security.” Amongst all the government buzz, however, is the CHIPS Act truly an act to strengthen the United States’ security, or a step forward in the domination of the industry?\n\nThe tensions between the technological giants boil down to Chinese threats of new cyber weapons and the diminishing gap between China and America’s AI computing power. Mirroring Cold War politics, both nations have been employing narrow export controls, especially in the aforementioned realm of weaponry and technology. This pre-emptive strike was described as “a revolutionary shift in the use of export controls” by Kevin Wolf, the leader of export-control efforts.\n\nOn the other hand, Liu Pengyu, a spokesman for the Chinese Embassy in Washington, stated that the United States “used its technological prowess to hobble and suppress the development of emerging markets and developing countries.” China is bringing the CHIPS Act incentives into question, requesting world politics to interpret these direct trade restrictions. Disregarding the blocs formed from the CHIPS Act, however, it is apparent that America is aiming for the technological upper hand, even sacrificing its legs of trade monetization in the process. As China has moved to restrict exports of raw computing-chip materials, a trade war has taken full effect, with either side vying for semiconductor dominance.\n\nTo exemplify, Intel has begun investing heavily in the Taiwan Semiconductor Manufacturing Company’s chips in order to reduce reliance on China’s resources, as per the Biden Administration’s intentions for the CHIPS Act. Additionally, on August 9, 2023, Chinese powerhouses ByteDance, Tencent, and Alibaba placed orders totaling around $1 billion to US powerhouse NVIDIA. NVIDIA was unable to offer its top two performance computing chips under the Biden Administration’s export-control rules; even during the progression of this article, the CHIPS Act is proving to keep China’s tech industry in a limbo state while American companies invest in foreign beneficiaries.\n\nClearly, the battle between these technological giants is not without its seismic effects. The “rumbling” has reached throughout East Asia and Europe, as most semiconductor industries rely on the business of US chips and Chinese imports. All chips produced by US companies require a license to be exported to China, which includes the manufactured products of technological key ends such as South Korea, a producer of a fifth of the world’s semiconductors. Chinese companies such as ByteDance can no longer consume Korean technology, crippling a sizable portion of Korean exports.\n\nIn retaliation, South Korea took its own strides in semiconductor authority amidst the US-China friction in March 2023. The South Korean Parliament passed the “K-Chips Act” tax bill, garnering support for its domestic semiconductor industry. This allows dominant companies such as Samsung and SK Hynix to obtain tax breaks as investors, boosting domestic production to alleviate the losses associated with the CHIPS Act.\n\nTo offset these losses, a report by Taiwanese market research firm TrendForce suggests that “the US CHIPS Act could greatly benefit Samsung, thanks to the subsidies provided.” Business Korea has also speculated that South Korea’s production share in the global market is expected to rise from 64% to 65% between this year and 2025. Although beneficial, these impacts may fall short of South Korea’s expectations regarding the growth of their tech industry without the CHIPS Act’s limitations.\n\nSouth Korea has had a central alliance with the United States for nearly a century, dating back to American aid in the Korean War. However, the South Korean government has made it clear that the trade conditions of the CHIPS Act could make the United States “less attractive as an investment option.” As the dynamics between the CHIPS and K-Chips Acts play out, South Korea must make a choice between business uncertainties and a beneficial semiconductor trade with China.\n\nIn October 2023, the US Department of Commerce announced that South Korean companies Samsung and SK Hynix are termed “validated end-users,” freeing their ability to ship equipment from the US to factories in China. This mechanism allowed South Korea to benefit from a lax restriction in the semiconductor trade, which South Korean Minister of Trade Ahn Duk-Geun deemed a “very, very significant measure” for Korean business and cooperation with the CHIPS Act.\n\nThrough this new policy, the United States was able to placate the uncertain South Korea, ensuring open negotiation regarding the CHIPS Act and semiconductor trade. From these negotiations, Seoul has found the balance between Beijing and Washington: trade versus security. Additionally, South Korean chip exports are on an upward trend, protected by a number of summits between President Yoon Suk-Yeol and President Joe Biden. The increased trade between China and South Korea is enough to restore South Korean faith in the industry, but it fails to allow China to surmount the continuous US export controls that stymie their progress. In essence, Chinese microchip intake has been neutralized.\n\nChina’s AI industry may lag far behind that of South Korea, but its semiconductor-powered infrastructure continues to bolster its nuclear threat — a threat very clear to any geographical neighbor. As a result, South Korea is partaking in negotiations with the Chinese government to confirm the integrity of Korea’s influx of exports. Beijing’s new control on advanced computing-circuit shipments means that neither South Korea nor China can utilize the computing goods for military use. Mirroring the United States, South Korea has also further locked down on national security by extending K-Chips tax breaks to “national strategic technologies.”\n\nIn this technological game of wits between the United States, China, and South Korea, each administration is looking to make moves that solidify their separate semiconductor industries. Each of these nations seeks to find harmony between their foreign and economic gains, and, as the Biden Administration continues to tighten trade restrictions against China, it is safe to say that all the chips are on the table."},
      {code:"FIN 002", title:"Income Redistribution: The Tightrope Between Equity and Efficiency",
        context:"Economics research essay \u00b7 HIEEC", year:"2023", award:"",
        excerpt:"The real dilemma lies within the balance of an equitable economy versus an efficient economy.",
        full:"The US economy has undoubtedly been experiencing a steady increase in economic inequality. The top 1% of the US economy has followed a rising trend, offsetting the balance between the top and bottom income distributions. To illustrate, the US Palma ratio, a measure of the top 1% share of national income, has grown by 0.09 during the past two decades. This is paired with a proportional decline of 0.1 of the S80/S20 index, indicating a decrease in the bottom 50%’s share of national income. It has become evident that the once-abundant middle class is slowly filtering towards lower-income employment without job protection, perpetuating inequality.\n\nThe implications of these indices mean that the current income redistribution policies are insufficient in alleviating the growing economic trenches across American fifths. In order to invigorate the middle class through income equality, the solution is clear: enhance redistribution strategies and further incentivize employment. Regarding the economy as a whole, however, the real dilemma lies within the balance of an equitable economy versus an efficient economy.\n\n—  1. DEBATE OVERVIEW  —\n\nWithin the past 20 years, the American Gini index has seen a net increase of 0.057, indicating an increase in income inequality. The decline of social mobility continues to be exacerbated by government tax and labor policies, along with ongoing discrimination by race and gender. In the same time frame, however, the USA’s real GDP has seen a steady increase that contrasts the decline of income equality. Policies that promote income redistribution promote equity, but hinder efficiency and falter growth. This trade-off between efficiency and equity, sacrificing one for the other, is representative of the redistribution dilemma.\n\nMany economists believe that it is better to further increase the economic growth rate in order to naturally resolve the inequality problem, rather than hastily implementing redistribution policies that may hinder growth. The trade-off example counters this belief, as the increase in growth showed no adverse effect on equity. The concentrated investments made by the top 1% make up a large factor of growth in the United States, which means that GDP reflects the growth of the wealthy disproportionate to the poor. Accordingly, real wages for low-skilled workers have barely risen since the 1970s, emphasizing that most of the income increase over the past decades has gone to the American elite.\n\nOn the other hand, skeptics of redistribution policies have referred to Andrew Mellon’s trickle-down economics as a force for economic efficiency and equity. According to Mellon, tax cuts for the rich would supposedly “trickle down” into the echelons of the poor through increased spending. In reality, however, a decrease in the government tax budget ends up impeding welfare and intervention. The experiment ended with the poor harmed far more in comparison, as the economic theory failed to benefit any income growth.\n\nIn response, protecting the progressive tax brackets would increase the government tax revenue received, allowing for a greater redistribution to the poor. This may reduce economic inefficiencies by an equitable allocation of resources, increasing the stimulation of productivity among the lower class. The lowered bars of entry for lower-income individuals can invigorate entrepreneurship and innovation, leading to a stable yet diverse economy. In order to find a method to promote equity while maintaining efficiency, more facets of income redistribution must be discussed. Policies should not encourage welfare dependency or reduced incentives while attempting to benefit the poor disproportionately. Rather, redistribution should come at the expense of the rich and for the benefit of human capital development.\n\n—  2. IMPLICATIONS OF REDISTRIBUTION METHODS  —\n\nA wealth tax, or super-millionaire tax, is the redistribution of income exceeding a very large threshold toward the lower classes. In other words, a wealth tax acts as an additional component to the progressive tax bracket that works to increase the net tax revenue. An implemented “Ultra-Millionaire” Tax on fortunes over $50 million has been reported to bring in at least $3 trillion in revenue over a 10-year period without raising any taxes on the majority of American households that fall short of the threshold. The marginal valuation of each dollar lost by the ultra-millionaires far undercuts the valuation perceived by the poor, preserving the surplus that would have been a deadweight loss of taxation. The downsides, however, are difficult implementation and discouraged investment: a study by the Tax Foundation found that GDP would be reduced by 0.2% and 2.4 million jobs would be lost. Once again, this policy leads to ambiguous results.\n\nThe taxation of luxury goods has also been a method of tax redistribution, mirroring the intentions behind a wealth tax. However, such a tax on demand-elastic goods results in a larger producer deficit rather than a consumer deficit, leading to disproportionate deadweight losses on the production of these goods. These losses harm the mid- to low-class employees in the process. When circumventing an explicit wealth tax, luxury-good taxes must be chosen carefully to maximize the efficacy of redistribution; the goal should be a greater burden on wealthy consumers, exploiting the lower marginal value of each dollar.\n\nThe impact of a Universal Basic Income (UBI) also elicits much discussion. Recalling the marginal value of each dollar across classes, a UBI would benefit the poor far more than the rich through distributions of equal monetary value, stimulating the economy through increasingly disposable income and revitalizing social mobility. However, UBIs have only shown positive results in very controlled studies, which cannot be replicated on a larger scale. Tax rates would have to increase, leading to adverse effects; even if the wealthy burdened the worst end of UBI taxation, the outcome would still be more inefficient than a sole wealth tax. Additionally, an injection of money into the economy risks inflation, and UBI studies have shown disincentives to work, as recipients mostly remained unemployed. Ultimately, a UBI leads to an exacerbation of the unequal conditions of the factor market, reverberating through firms and perpetuating unemployment.\n\n—  3. PROPOSED DEVELOPMENTS  —\n\nOutside of the previously discussed methods, public services have played a large role in American income-equality efforts. Welfare programs such as SNAP and TANF provide direct assistance to low-income households according to required aid, unlike a UBI. Other public services, such as education and healthcare, provide the largest disproportionate benefit to lower-income households. Investing in these services is a logical method of reducing inequality and supplying more opportunities to the less wealthy — without deadweight loss or political instability, and without subsidizing unemployment. In this quest for the balance between equity and efficiency, a focus on public services can be the key to economic equilibrium.\n\nProponents of income redistribution point to countries with high levels of it, such as the Nordic countries, as evidence that it can be successful. The United States’ Lorenz curve bows out much further than Finland’s from the line of perfect equality, indicating greater income inequality. Nordic countries like Finland create a strong social safety net — universal healthcare, tuition-free college, paid parental leave — ensuring equality of opportunity through the equitable maintenance of human capital. To fund this, the expense is levied to the wealthy: in Finland, the top tax rate kicks in at 1.9 times the average wage, while the United States’ kicks in at a factor of 9.3.\n\nIn conclusion, a country like the USA, with the data to determine income and assets, should focus on expanding medical and educational benefits to low-income households. The growth of desirable human capital is the factor that determines the wage gap, which is proven to decrease inequality. Pulling back on wealth taxes and UBI-like welfare can re-incentivize employment, leading to a policy that promotes both equity and efficiency. By developing these public services, income equality along with quality of life can rise without hindering the overall growth of the economy."},

    poems: [{code:"POE 001", title:"Mornings after I wake up from a dream", venue:"", year:"",
        text:"False grace falls upon me as if\nI were the realization of a cruel choice\nhow can you choose to linger,\nto cascade onto me, the tip of this\nTranquility, strings plucking,\nthe shadow’s\napparition sings a cheerful tune\nRinging.\nI careen at the sight of hair\nplunged deep in my fingernails against\nthe reminder of what is a nosebleed on a pale face,\nDo we dream, or are we dreaming? we\nlive not for petty remembrance\nnor the echo of what lies after, for\na tree felled in a silent forest never\ncould be.\nand the echoes say that sleep is the cousin of death\nand yet the shepherd of life.\nand that sting is the chase\nof what lies behind me I lean\nforward I stretch my limbs beyond\nthe confines of necessity.\nFootsteps romping ceaselessly against my\nglacial wind boats pressing\nagainst the moon’s pull I cannot break\nfree from the chains that bind\nmy empty hands every tide.\nThat sting is\ntucked under the celadon froth of brain\nand left to settle, to\nsolidify\nBut even stable leaves part from their\ntree,\nmarry the air, and\nI fall along to kiss the undergrowth.\nThat sting is the peaceable mourning of dawn.\nthe dreamlike silver filament\nlying taut between my brain and ankle, shackle and\nbolt that dissipates\na fingertip’s journey away,\nThat sting is the cost of the forgotten\nof the saltwater cleansing loose wounds\nBut it is the sliver of memory\nthat will kill a man.\nI jolt to the ringing silence of my\nSymphony that decaying tint of the final note too\noppressive for my awaiting hands to collide.\nI sit, the faint scent of rust and\nthat metallic sting in my mouth\nCruel, and yet\nit is the sting that wakes us up."},
      {code:"POE 002", title:"Dandelion", venue:"", year:"",
        text:"The gardens are blue of\nseashells and green\nof fluorescent misjudgements.\nI pluck the yellow of misery and\nthe white of death, a\nDandelion from its home,\nforever a weed.\nThe broken stem is hollow\ninside yet it signals the hazy sap of life as\nthe broken signals white death A\nlime Green on one side and purple -\nreddish ombre on the other like a\nhalf-ripe sweet potato mistakenly purchased\nat H-mart.\nGreen leaves not yet yellow\nno longer away from death the black\ntips wilting downward like the hands\nof broken children burned, soot,\ndust unto our own skin reaching\ntoward the world’s underbelly\nSmall white prickles on the stem a\nfaux-protection imitating the thorns\nof roses but reinventing feathers\nto sow its seed from the perspective of God;\nThe central black furl puffs like an urchin in\n9th-grade Bio grasping the\nwhite-tinted seeds unrelenting, never letting go but\nlike the mother of a sick\nchild even a breeze can\nseparate the two."},
      {code:"POE 003", title:"Sun (Claire de Lune)", venue:"", year:"",
        text:"A pasture, imbued with the velvety\nflesh of sun, marked\nby the strides of rain and the\nurine of dogs and\nQuiet.\nBut quiet is volatile.\nShe had the hair of ember, the tone of\nAutumn before its first snowfall\nblazing through the pasture, hair burning,\nrunning as though her pattering feet were\ntorches refusing to light within\nthe cornrow’s matchbox.\nShe was her own inferno\ncamouflaging into\nthe sunset a\nbarrage of sparks a flurry of\njeans and Auburn knits, the only parts\nof her that fire can distinguish\nfrom fuel.\nBut every flame must feed\nOn the peak of a moment.\nShe loved the sun with all her\nbeing she loved its warmth its\ngrace its heat its flames its hearth she\nspent her days resting\non its fingertips, and her nights\nchasing after its breath an\neternal simplicity.\nUnder the pressure of\ndiminished heat she blazed through\nthe pasture and his crops and\nherself - grazing\nevery flower given\nlife by the sun under its watch\nuntil she could no longer run,\nthe fire doused by a spray of the night the\nmoon so bitter and pale.\nUpon her death, she believed, she\nwould be reunited with the sun to blaze\nto the ends of the Earth that\nswallow the sun\nand spit out the moon the\ninklings of the maker\nof life that hold on for all of\neternity, to leave her\ndesires, to yearn for her return at\nthat very pasture.\nThe privilege to tip-toe this gilt-laced gossamer\nthat is her world, to balance between the\ntwo celestial bodies of the sun and\nthe moon, the rulers of death and nonliving,\nlife and life’s respite.\nUpon her birth, she believed, to\ncollect the essence of a moment is to rob\ndeath of life.\nTo lift a sunflower from its roots is to\nallow it to chase the sun until the throes of time, to\nfeel a greater warmth than its siblings but\nIf a picture is worth a thousand words, how\nmany wilted petals are worth a letter?\nIn its everlasting love, the sun in\nits infinite wisdom never\nlifted the girl nor\na sunflower into its domicile\nWe\nlay forever condemned to blaze along the surface of\nour only Earth, for\nIf you love a flower you leave it in the ground."},
      {code:"POE 004", title:"Moon (Nocturne)", venue:"", year:"",
        text:"The dirt field, suffused with the concrete\nbite of the moon, marked\nby the remnants of a blaze and yet,\nthe memory of moisture\nand cicada chirps\nA Spring night so dark it\ncould have been Winter fell on\nthe man like an aired blanket to\na straggling bed bug\nThe man loved the moon, loved\nits uncategorizable grayish-white color, loved\nits darker spots as much as\nthe lighter ones.\nAbove all, the man loved the moon’s loyalty.\nHe loathed the sun, for the sun\nfalters at night but the moon\nstands guard throughout the day.\nWhy should the moon bear\nthe burden, to witness the\nmassacre of nightfall befalling the\nsun’s faulty creations.\nThe man hated the sun and\neverything borne beneath it.\nHe himself belonged to no one.\nFalling in love is a bit like\nstargazing - guarded by the loyalty of\nmoonlight and guided\nby the slumber of the sun\nWe can never know the warmth of a star lest\nwe can reach out and touch it.\nBut nobody could be so foolish\nCold. He traversed the dewy grass,\nhigh weeds, and marsh pools glistening\nof gunshot wounds before the chill\nof the moon after the absence\nof brilliance.\nCold. Two gentle hands brushed\nupon a flower, delicate and dry, free\nfrom the reminiscence of rain the\nmemory of life it\nfelt like sorrow like\na melancholy story told by a woman he once loved\ntainted by the knowledge of a spoiled\nending a spider that laid its silk\nbut died unable to connect the two ends together\nCold. Drunk on the horizon, stumbling\ninto what remains hidden from the illumination\nof the moon and the faux-warmth of the stars the\nMan convulsed like the tides of an ocean\nunder the moon’s oath tripping over\nstones that were once shells discarded\nelsewhere from which they were born\nHe plucked the flower from the ground,\nan act of defiance, trudging into\nthe creek reeking of blank knots and\nloose ends its petals came apart to become one with\nthe night sky, to forever be under the moon.\nA fate shared by all that lives.\nThe man floated within the\npolarity of the creek’s water, guided\nby the unrelenting\nshade of moonlight, by\nthe mellifluous\nchorus of mourning frogs, by\na severed stem with no petals, for\nIf you love a flower you leave it in the ground."},
      {code:"POE 005", title:"Eclipse (Rach 2)", venue:"", year:"",
        text:"An eclipse understands nothing but thievery\nIt knows nothing but to take\nfrom its own creation\nAll but darkness frowns\nat the essence of concealment\nA fallen tree unheard by the forest\nmight as well stay upright, but\nthe moon blots out the sun in\nan instant.\nThe world lies dormant for the time it takes\nfor a girl to pay a visit to the sun, for\na man to glow under the rare effulgence of\nthe moon, for\na flower to be plucked for\na loss of humanity\nin a moment.\nThe murk of the moment, a\ntemporary dusk to lie forever, to\nveil any vision beyond itself.\nThe darkness becomes what we seek.\nIt consumes what we know.\nIt collapses into its own streams\nof consciousness when our moons\ncross our suns\nTo Shroud it.\nTo Obscure it.\nTo shield us from\nthe guidance of luster, the\npotent acridity of light.\nBut\nIf every flashlight shone\non the right path would we not choose\nto rummage in the darkness? Would\na restless sun not cause the\nworld to end?\nFor\nLight is naught without dark and\nDark is naught without light. They\nare borne of each other, feed each\nother, consume each other, crease upon\neach other.\nIn the darkness of an eclipse there lies\nthe glimmering kindle of conception that is and\nthe muted handle of what may lie after.\nOnly through an eclipse can we truly see\nbeyond the garden of quiet the\nbroken promise of sunlight the\npiercing dull of the moon, for\nIf you love a flower you leave it in the ground."},
      {code:"POE 006", title:"Untitled", venue:"", year:"",
        text:"Around eight o’clock the tower\nBooms only seven times the\nClick clack consuming the\nDeath of the\nEight toll. Sometimes the\nFacade of life is the everlasting\nFear of what there is and what there cannot be,\nyet my evocations from the past cannot be taken\nfor Granted,\nI was Given the opportunity to balance on the\nGilt-laced Gossamer of life, silk from a spider or rather a spider from its silk I\nHit life on the Head with nothing but\nIllusions slathered my eyes like a tub of\nJello entrusted to a\nKid, but I am, I was a\nKid once;\nLemon-Lime soda and\nMango smoothies that stitched\nMemories to My skin, a corrupt Marionette this\nNotion of home that strung me into\nOne\nPiece of mind but my\nQueries into the\nRubber-burning\nScent of\nReality which\nSent me forward in\nTime; a\nTitan slowly rolling its boulder over its Top but\nUnder the suffocation of my viola notes, noting\nWhere in the World\nX could solve for Y but\nWhy did I feel no\nZing, when the tower rang for the eighth time."},
      {code:"POE 007", title:"Poetry", venue:"", year:"",
        text:"I want to be\nsomewhere time\npasses slowly\n\na place where I can\nwalk up the stairs one at a time\nor stop on the crossroads\n\na place where\ni can let all my tears out\nbefore i wipe them\n\na place where I can capitalize my i’s\nas i write them\n\nsomewhere with a breeze\nand a scent lingering\nan ocean’s moon a window’s glisten\nas my hair changes color\n\nsomewhere I walk slow my feet\none half of another\n\ni want to clear my nose\nsteepen my breath\n\nit arrives after we begin\nand before i finish\n\nyou’re foreign\n\ni need to go somewhere and walk slow\nclear\nwhere time aches\nsmooth\nwhere i can write about myself\nand feel\n\ndeeply sink my\nbones to remind\na pale face that image of a bloody nose\nlaugh and linger a\nbeach everyone smiles\nthe sun shelters it fills\nit\n\ni close my eyes\nand feel the solitude\nand it’s good\n\ni stretch my arms. finger\ntips faux leaves in a false wind\nswaying nonetheless\n\ni need to go far\ngo slow\nnot here\n\nsomething not my own\ncontain my soul\nin another pantry\nforeign enough to soil\nto wrangle my life\nto love again\nto touch"}
    ],

      {code:"ESS 002", title:"Matcha Labubu Tote Bags: Performative Males in Gladiator and Beyond",
        context:"University Writing \u00b7 Performance Arts", year:"2025", award:"",
        excerpt:"We are all closer to Commodus than we are to Maximus, but that’s okay.",
        full:"Hurling a sword at the stands, protagonist Maximus Decimus Meridius shouts at the Colosseum’s roaring crowd, “Are you not entertained? Is this not why you are here?” (1:07). This scene in Ridley Scott’s 2000 film Gladiator, one of the most iconic in cinema history, is rhetorical. The crowd is entertained, of course, emphasizing the barbaric nature of gladiator culture in ancient Rome that Maximus despises. He is critiquing his audience and calling out the performance of combat itself, exposing the fact that his violence, his identity as “gladiator,” exists only to satisfy the crowd’s bloodlust. The critique falls short, however, as the crowd erupts into a greater applause, a chant of “Spaniard” that further glorifies the protagonist. Clearly, the best gladiators weren’t necessarily the strongest or most skilled fighters but the ones who knew how to work the crowd, to transform murder into entertainment. As Maximus’s critique of performance fell on deaf ears, the crowd perceiving it as Maximus’s gladiatorial cry, the scene reveals the hollowness lying at the center of performance, the gap between who you are and who you’re pretending to be.\n\nWe see this dynamic play out through the contrast between Maximus and Commodus, the film’s antagonist and target of Maximus’s revenge. After cheating Maximus and usurping the throne, Commodus desperately performs the role of emperor, staging elaborate gladiatorial games and constantly seeking validation from the crowd. Writer Brad W. Carr observes in his essay on masculinity in Gladiator that Commodus’s “lusting and longing for the admiration of the people… only served to have the opposite effect throughout the film” (Carr). The more Commodus overplays and performs power and masculinity, the more hollow he appears. As the film’s audience, we see the disconnect between Commodus’s fragile and anxious masculinity and the mask he puts on as emperor, solidifying the gap in his performance, that he longs to be masculine, to be like Maximus.\n\nMaximus, by contrast, doesn’t perform outside the arena. He is more so the embodiment of masculinity and the object of admiration throughout the film, emphasized by the respect he held from Roman generals and even the former emperor, who anointed him the next emperor of Rome. Maximus was a general who fought because duty demanded it, someone who valued his family over bloodshed. His masculinity was effortless. Carr writes, “Maximus, in my opinion, is one of the ultimate masculine figures that has been portrayed to me in any film or story throughout my life so far” (Carr). Carr goes as far as to say that Maximus is a reminder of “what I would like to strive for as a man existing in this world,” displaying the disparity between Commodus and Maximus’s masculinity within the essay. As Maximus tells his trainer, “I am required to kill, so I kill. That is enough,” it’s clear that Maximus is admirable because he’s not performing (1:09). He is himself even below the eyes of 50,000 Romans.\n\nTwenty-five years since the film’s release, we have entered a new kind of arena, a different kind of performance bringing thousands of Commodus’s into the spotlight. Representing this battlefield perfectly is an August 2025 TikTok by user @latenightnatee, which shows a young man with baggy jeans, labubu attachments, a tote bag, and wired earbuds presumably playing music by Faye Webster or Clairo, all while reading feminist literature and sipping on an iced matcha latte (nate [@latenightnatee]). The video is coupled with text that reads, “bro is not fooling anyone 😭🙏” (nate [@latenightnatee]). Such a video represents the “performative male” trend that has caught the internet by storm.\n\nIncreasingly, internet users have been asking the same question Maximus asked the Roman crowd, except the Colosseum cheers have been swapped out for digital likes and the gladiatorial bloodshed for satirized male manipulation. Although the trend is clearly unserious in nature, its complexity and mainstream longevity allow us to further explore performance, especially performative masculinity. We can ask, is this performance of progressive masculinity authentic, or is it just another act designed to win applause, this time from women and liberal audiences instead of Roman spectators? By examining the evolution of the “performative male” through Gladiator’s exploration of masculine performance, Erving Goffman’s theories of self-presentation, and the contrast with hypermasculine figures like Andrew Tate, we can reveal a complex reality: authenticity in modern masculinity may no longer exist, especially during our Internet age. In other words, we are all closer to Commodus than we are to Maximus, but that’s okay.\n\nTo begin answering this question, we turn to the trend’s origins. According to journalist Sabrina Figueroa in her article for The Aggie, “The ‘performative male’ trend is an opportunity to analyze and correct harmful and dishonest behavior from straight men that continues the streak of power disparities, both in society at large and in individual heterosexual relationships” (Figueroa). It makes sense, then, that the “performative male” trend began as a social critique, a way to call out men faking feminist values to attract women or gain social capital. As Figueroa writes, “Instead of men preaching to the choir that they love women, they should show it with their actions,” the stark opposite of what the trend embodies (Figueroa). In essence, the trend sought to identify men like Commodus, who desperately performed values they didn’t embody. It was meant to expose the gap between performance and reality, to raise awareness and deter men from “performing” feminism.\n\nBut something unexpected happened. The critique of performative masculinity became so widespread, so culturally dominant, that it began to glorify performative males. Figueroa identifies this shift, stating the trend “has transitioned from holding men accountable to focusing on the aesthetic” itself (Figueroa). This is why we are looking at a pandemic of matcha lattes and labubu tote bag quarter zips, with young men intentionally embodying the look, not ironically, not to mock or critique performative masculinity, but because the aesthetic itself attracts attention. The trend has become a layer of performance, disguising attention-seeking behavior as self-awareness. What started as calling out dishonest behavior morphed into celebrating a feminized style of masculinity. The critique inverted itself. The satire has collapsed into sincerity.\n\nThis collapse is nowhere more evident than in the “Performative Male Contest” recently held at Columbia University, in which students competed to embody the performative male aesthetic most completely. In an article by the Columbia Spectator on the event, a student was quoted saying, “It takes something that’s like men going out of their way to try to attract women or try to be fake, and it turns it into something that people can kind of laugh at and bond over,” putting a positive spin on the “performative male” trend (Columbia Spectator). Figueroa, on the other hand, writes that these competitions “can simply be a ripple in continually perpetuating regressive gender norms,” marking an adamant stance against the trend (Figueroa). Although the trend may build a foundation for people to “bond over,” it enables men to perform the performance of progressive masculinity, adding layers to the performance of attention-seeking.\n\nThis attention, “winning the crowd,” as Maximus’s trainer calls it, is the newfound goal of young men in today’s era. As the crowd’s favor kept Maximus alive in the arena, it is the media’s favor that keeps performative masculinity afloat. Sociologist Erving Goffman provides the theoretical framework for performance in his work, The Presentation of Self in Everyday Life, in which he argues that all social interaction is fundamentally theatrical, that we’re always performing. He writes, “The audience senses secret mysteries and powers behind the performance, and the performer senses that his chief secrets are petty ones” (Goffman 46).\n\nThe “secret mysteries and powers” in this case are the presentation of supporting women and caring about social justice that the audience senses. But the secret, as Goffman notes, is that there often is no mystery. There’s no deeper authenticity underneath the performances we see on TikTok, Instagram, or Low Steps. The tote bag doesn’t necessarily signal genuine feminist consciousness; it signals knowledge of that very phenomenon. The real problem behind performance, then, is preventing people from learning that there’s nothing substantial underneath. Returning to Carr, it is this lack of true masculinity that makes Commodus such a “repulsive” character (Carr). We know Commodus’s true self in his fear and insecurity; that is exactly why we, along with Carr, despise the antagonist. Our lack of background on the men continuing the “performative male” trend, then, further mystifies the “secret powers” Goffman writes about, presenting the trend as something much more positive than it actually is.\n\nThis is also precisely why TikToker Eion Falance’s critique of the trend resonates. In a viral video, Falance confronts the performative male aesthetic directly: “You have this idea of what masculinity is. But it’s not actually what you think it is. You’re living in this bubble” (eion [@eionfalance]). He argues that the “performative male” aesthetic is no different from toxic masculinity, that intentionally feminizing oneself is the same amount of performance as trying to act more masculine. According to Falance, they’re just performing for different audiences with different values.\n\nTo fully understand the “performative male,” then, we must examine its apparent opposite in the hypermasculine and toxic male. Andrew Tate, a former kickboxer turned internet personality, embodies hypermasculinity in mainstream media. Known as the “Top G,” Tate promotes an aggressively traditionalist masculinity full of materialism, physical dominance, explicit misogyny, and contempt for emotional vulnerability. On the surface, Tate and the “performative male” represent opposite poles of masculinity. One drinks matcha while the other smokes cigars.\n\nAs Coleman Hughes writes in the City Journal, both types of masculinity are fundamental performances responding to the same underlying problem: “Our society’s failure to provide appealing masculine archetypes” (Hughes). Hughes argues that both the “performative male” and the “Top G male” are reactions to the constant performance demanded by today’s media. Both performances are curated responses to perceived expectations. Tate performs cartoonish hypermasculinity, appealing to an audience of younger men as deliberately as the performative male performs progressivism to an audience of women. In essence, Andrew Tate is a performative male, just on the other end of the spectrum, proving how performance lies beyond simple beliefs in politics. This is a frightening revelation, marking the deceit that comes from all angles. We must be wary of both the performative male and the hypermasculine one. The similarities between the two extremes are further explained by Goffman, who writes that performances ask us to “believe that the character they see actually possesses the attributes he appears to possess” (Goffman 10). According to Goffman, both Tate and performative males are playing characters for their audience; the mainstream media today provides us with no authenticity to build our masculinity on.\n\nViewing Gladiator through this new lens, we see that Commodus embodies this Tate-like hypermasculine performance. He stages displays of political power, arranging fights he’s skewed to win. Commodus is performing a toxic masculinity that he believes the emperor of Rome should exude, the main stake of irony in the film. Gladiator’s central insight lies in that Maximus was appointed the next emperor because of his quiet competence, his lack of performance. When Commodus stabs Maximus before their duel in the Colosseum, it’s a symbol for the performative male attacking traditional masculine ideals, trying to become a character that is too perfect to be true.\n\nThe layers of performance we’ve discussed hint that authenticity is no longer possible. Goffman argued that the self is a constant performance, which resonates even more because he wrote these beliefs before the Internet and media were ever a thing. As we continue to consume films, creators, and trends, the most authentic we can be is to perform for the audiences we deem important. Everyone, from Commodus to Tate to performative males, is performing for a different audience.\n\nWhether we pursue the “grindset” or the next labubu deluxe drop, as long as we perform an identity that aligns with our actual values, we can portray our own take on masculinity. As such, trends such as the “performative male” pandemic can be an outlet to consume and create, to build a performance from our own ideals. We must, however, remember the original critique of manipulative males, maintaining that our performances do not harm others. As long as the media churns out new content and the world continues to throw new people into our lives, we can only hope we’re entertaining enough to survive another day. We’re always in the arena, and the crowd is always watching.\n\n—\n\nWorks Cited\n\nCarr, Brad W. “Gladiator: The Ultimate Lesson on Masculinity.” Medium, 15 Aug. 2020.\n“Columbia Students Hold ‘Performative Male’ Competition.” Columbia Spectator, 12 Nov. 2024.\neion [@eionfalance]. “You Don’t Have to Be This Guy.” TikTok, 15 Dec. 2024.\nFigueroa, Sabrina. “The ‘Performative Male’ Stereotype Might Mean More Than We Think.” The Aggie, 4 Oct. 2024.\nGladiator. Directed by Ridley Scott, DreamWorks Pictures, 2000.\nGoffman, Erving. The Presentation of Self in Everyday Life. Anchor Books, 1959.\nHughes, Coleman. “Andrew Tate, Masculinity, and Society.” City Journal, 22 Feb. 2023.\nnate [@latenightnatee]. “Performative male.” TikTok, 21 Aug. 2024."},
      {code:"ESS 003", title:"Sisyphus and Salvation: The Humanity of Happiness in Perfect Days",
        context:"University Writing \u00b7 Performing Arts", year:"2025", award:"",
        excerpt:"We must imagine Hirayama happy not despite his tears but because of them.",
        full:"Wim Wenders’s Perfect Days is a film defined by its deceptive simplicity: Hirayama, an old toilet cleaner on the outskirts of Tokyo, wakes up each morning to an empty room and the same routine. He drives down the same streets, cleans the same toilets, and reads the same book before falling asleep each day. The film’s quiet and deliberate repetition initially suggests emptiness, its solitude contrasting the conflict and action that imbues movies with emotion. It is through Hirayama’s approach to life, however, in the way he pauses to photograph leaves and plant trees in makeshift pots, that creates rich meaning and a fullness within the movie. Perfect Days is, then, a film depicting the essence of humanity. By exploring Hirayama’s contentment through the lens of two clashing texts in Albert Camus’s The Myth of Sisyphus (1942) and Colossians 3 in the Bible, written by Apostle Paul, we can reframe the human condition of happiness, discovering how we can find contentment within our own lives. We can begin to answer the questions of how, why, and even if Hirayama is happy at all.\n\nWenders discreetly constructs Hirayama’s world through a cinema of observation rather than explanation. In scenes spanning nine uninterrupted minutes, we simply watch Hirayama bathe, get a newspaper, water his trees, and read a book (0:21-30). No dialogue, no score, only the ambient sounds of Tokyo and nature. Like his sound engineering, Wenders’s camera doesn’t hurry or telegraph but witnesses, particularly emphasizing natural sunlight and Hirayama’s serene facial expressions. The best way to describe this film is that it simply exists within its monotony, subtly inviting us to explore Hirayama’s emotions through his seemingly meaningless routine.\n\nSearching for meaning in a meaningless routine, our mission is then woven into absurdism, a philosophy rooted in man’s search for meaning in an inherently meaningless universe. To revered absurdist Albert Camus, Hirayama and his routine would be a vessel, a celebration, even, of absurdist rebellion, a hero finding joy in the acceptance of his meaningless existence. Camus’s The Myth of Sisyphus is an essay encapsulating the human desire for meaning through the Greek myth of Sisyphus, the man condemned to roll a boulder uphill for all eternity. Written against the backdrop of totalitarian regimes, the fall of France, and WWII, the essay describes the futility of life and what one can gain by accepting it.\n\n“One must imagine Sisyphus happy,” Camus insists, locating happiness not in the liberation from struggles but within the struggles themselves (3). This absurd happiness offered by Camus is then a near-perfect explanation of Hirayama’s contentment. As Sisyphus rolls his boulder day after day, Hirayama maintains his arduous and monotonous routine to match. As Hirayama smiles after each toilet is cleaned and each measly meal is consumed, it becomes apparent that for Hirayama, at least, “the struggle itself towards the heights is enough to fill a man’s heart” (3). Sisyphus and his boulder serve as an allegory of man’s consciousness of his fate, work done for the moment instead of a higher, transcendent purpose. Accordingly, Hirayama seeks no luxurious escape or relaxing retirement. His cyclic routine never gains an end in sight, a clear mark of an absurd hero. According to Camus, we must imagine Hirayama happy.\n\nCamus’s framework, however, does not fully account for the story Wenders shows us. While Sisyphus exists in a pessimistic vacuum, we begin understanding Hirayama through his warm interactions with other people. Here, we introduce Paul’s letter to the Colossians, a message for first-century Christians reaffirming Jesus Christ amidst the religious pluralism of the Roman Empire. We can draw parallels from the shunned Christian to the ostracized Hirayama, but the real argument stems from Paul’s offering of a counterpoint to absurdism while encapsulating Hirayama’s experience through a spiritual lens. Paul’s depiction of the ideal Christian, someone who has “put to death… sexual immorality, impurity, passion, evil desire, and covetousness,” is an immaculate depiction of Hirayama’s almost saintly existence (Col.3.5). Wenders portrays Hirayama as a man content with being alone, whose strongest sexual desire was nothing more than a brief admiration for a bar owner. His lack of desire for riches, shown when he refused to sell his cassette tapes and instead gave his coworker allowance money, continues his otherworldly kindness and Christlike attitude (0:39-41). Paul then instructs to “Put on… compassionate hearts, kindness, humility, meekness, and patience,” another list that Hirayama flawlessly showcases through his care of lost children and bathroom-goers (Col.3.8). To Paul, the essence of Hirayama, besides his explicit faith, which is undisclosed by the film, would signal happiness under the grace of God, a pure man who embodies the Christian joy through salvation.\n\nWhat emerges from setting these texts in conversation is a recognition that their differences stem from different contexts and concerns. Camus wrote against false transcendence and omitted religion, while Paul wrote to offer religious assimilation. Perfect Days suggests that these texts aren’t opposites but different aspects of the same achievement: finding fullness, an enlightenment of sorts, in the present moment requires both Camus’s acceptance of struggle and Paul’s attention to the sacredness of ordinary tasks. This synthesis becomes a new perspective on the human condition, one we can apply to Hirayama through analyzing the film’s most pivotal scenes.\n\nReturning to Sisyphus, Camus describes the moment of his descent, when “he leaves the heights and gradually sinks towards the lairs of the gods,” as the moment “he is superior to his fate” (2). This moment of lucid acceptance, this “hour of consciousness,” is what allows the absurd hero to triumph over his torment, to appreciate the beauty of the struggle, of the moment (2). To Hirayama, this descent is symbolized by his drives to and from work. Perfect Days places a unique emphasis on these drives through the overlay of upbeat, happy songs playing from Hirayama’s cassette tape (0:18-20). Hirayama’s drives hold the only instances of background music through the generally silent film, amplifying its emotional weight. The journey towards the boulder, a metaphor for the hard day of work ahead of Hirayama, then represents the source of Hirayama’s happiness, his acceptance of his fate. The music playing also poses the new argument that Hirayama must rely on external forces to lift his mood during the “hour of consciousness,” that he must smother his sorrows during the moment Camus claims should be the peak of his happiness. Unlike Camus’s verdict, it could very much be that Hirayama is only pretending to be “stronger than his rock,” that the pressure of living is actually weighing upon him (2).\n\nCombatting these sorrows is Hirayama’s photography, an instrument of joy once again deviating from The Myth of Sisyphus and conflicting with Colossians: while Sisyphus finds meaning through labor alone, Hirayama finds meaning by consciously dissolving each day into individual moments, finding joy in the little things. Hirayama’s primary pleasure and an encapsulating symbol for the entire film is the Japanese concept of komorebi, the moment when sunlight filters through leaves, which he photographs and prints. The lingering moment of the leaves swaying in the wind is the only recurring image in each of Hirayama’s dreams as well (0:51-52). These photographs represent neither Sisyphus’s descent nor Paul’s instruction to “set your minds on things that are above, not on things that are on earth” (Col.3.2). Instead, komorebi captures something both frameworks miss: fleeting beauty that is very much earthly, selfish, and existing independently of struggle and salvation. Hirayama’s photographs suggest that his happiness derives not from accepting his fate or transcending earthly concerns, but from seeking beauty outside of his labor.\n\nKomorebi answers the first portion of our question, that Hirayama is indeed happy for portions of the film. To answer where this happiness comes from, then, we must imagine a Sisyphus struggling in his trek uphill but pausing to admire the world around him, finding joy in the senses that make his endless work a little more bearable. We must imagine a man balancing the good in his life with his burdens. The film, through komorebi, suggests that Hirayama’s happiness comes from the moment, from each meal eaten to every book read. Here, it’s reasonable to claim that Hirayama isn’t always happy but seeks contentment in the moments outside of his labor rather than within it.\n\nShifting from happiness to its antithesis, one of the most remarkable scenes in Perfect Days involves a meeting between Hirayama and a man with terminal cancer, where they consume alcohol and play drunken tag with their shadows (1:48-54). This scene bleeds mortality, a symbol of Hirayama coming face-to-face with his fated demise. As we interpret Hirayama’s black-and-white dreams and his father’s prior hospitalization as illustrations of suicidal thoughts, the shadow tag becomes a symbol of Hirayama’s wrestle with self-inflicted death, his victory symbolizing the will to continue living. Hirayama’s battle with mortality contrasts with Paul’s declaration that he “has died,” and his life is “hidden with Christ in God” (Col.3.3). While Colossians 3 offers us explanations into Hirayama’s happiness, his undisclosed faith means his desire to live is rooted in something other than religion. The Myth of Sisyphus also deals with death in that suicide isn’t an option for Sisyphus’s mythological punishment. Yet, it plays a large role in absurdism and existentialism, the philosophical precursor to absurdism that places the individual as the master of their fate. Once again, Hirayama withstands the option of death detailed by our two texts, indicating a measure of happiness external to labor and spirituality.\n\nAlthough it lacks traditional conflict, Perfect Days acknowledges the downsides of Hirayama’s life, a necessary discussion to analyze Hirayama’s happiness. Hirayama’s isolation, his estrangement from his wealthy family, is painful. His relationship with Niko, his niece, reveals the human connections Hirayama has mysteriously foreclosed. In an interview with reporter Stefania Tsivelekidou, Wim Wenders stated that “Hirayama is the master of his life,” that “everything he does, he does it because he wants to do it” (Tsivelekidou). To Camus, this would be the essence of happiness as Sisyphus “knows himself to be the master of his days” (3). To us and Apostle Paul, however, Hirayama’s choice to continue living his painful and monotonous life becomes even more apparent and alarming. When his niece Niko asks the question of why he lives this way, Hirayama simply says “next time is next time, now is now,” citing neither faith nor philosophy (1:29). This rejection of both past and future suggests that Hirayama has found a radical presentness to moments of spontaneous beauty that punctuate, rather than redeem, his repetitive days. Wenders paints this gateway of life, then, knowing it seems foreign and imperfect to us.\n\nThis disparity between Hirayama and us, the viewers, explains why Perfect Days carries such an elusive message: Hirayama is simply static and unrelatable. As we watch the film’s final scene, however, we see Hirayama alone in his van, crying, smiling, then crying again, with no distinction as to which emotion dominates that moment (1:56-58). A vessel of complex emotion, his face begins to mirror ours, masks that filter contentment with melancholy. There is something distinctly Sisyphean about this scene as well, as Hirayama’s emotions cycle to no avail in just a minute, just for a moment of his larger routine that remains as monotonous as ever.\n\nAs we finally relate to our main character, we recognize the fundamental paradox both Camus and Paul, in their conflicting ways, articulate: Human existence contains irreconcilable tensions that cannot be resolved but only inhabited. Each tear indicates that his consciousness produces grief, while laughter indicates that there is value within his suffering. As Camus credits conscious acceptance of limitation and Paul the belief in the limitless, we should credit the possibility of both simultaneously for Hirayama’s inexplicable happiness. We must imagine Hirayama happy not despite his tears but because of them, because he alone achieves what Camus and Paul gesture toward: the capacity to be fully present to life as it is, accepting the boulder’s path and the Christian afterlife as extensions of the present.\n\nPerfect Days, then, presents a challenge to each of us. Hirayama’s happiness, complex and imperfect as it is, urges us to examine ourselves and how we find fulfillment in the present. To encounter happiness, we must first imagine ourselves happy.\n\n—\n\nWorks Cited\n\nCamus, Albert. The Myth of Sisyphus. Translated by Justin O’Brien, Penguin Classics, 2000.\n“Colossians 3.” ESV Bible.\nTsivelekidou, Stefania. “Wim Wenders on ‘Perfect Days’: ‘Everything Feels Almost Holy.’” Frieze.\nWenders, Wim, director. Perfect Days. Plaion Pictures, 2023."},

const esc = s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
