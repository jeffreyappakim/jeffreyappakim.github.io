/* ── generative background: flowing wave-line ribbons ── */
(function bg(){
  const cv=document.getElementById("bg");
  const ctx=cv.getContext && cv.getContext("2d");
  if(!ctx) return;
  let W,H,dpr;
  function size(){
    dpr=Math.min(window.devicePixelRatio||1,1.5);
    W=cv.width=Math.floor(innerWidth*dpr); H=cv.height=Math.floor(innerHeight*dpr);
    cv.style.width=innerWidth+"px"; cv.style.height=innerHeight+"px";
  }
  size();
  window.addEventListener("resize",size);
  const LAYERS=[
    {y:0.50,a:0.050,c:"#D3DFD0",s:7},
    {y:0.58,a:0.070,c:"#BCCEBB",s:12},
    {y:0.67,a:0.090,c:"#A2BAA3",s:19},
    {y:0.77,a:0.110,c:"#86A48B",s:29},
    {y:0.88,a:0.125,c:"#6C9074",s:42}
  ];
  // herd on the ridges — {u: 0..1 across, li: layer index (1 far..4 near), s: height px, flip}
  const goatImg=new Image(); goatImg.src=IMG_GOAT;
  const lebImg=new Image();  lebImg.src=IMG_LEBRON;
  if(typeof reduceMotion!=="undefined" && reduceMotion){ goatImg.onload=()=>frame(9000); lebImg.onload=()=>frame(9000); }
  const HERD=[
    {u:0.08,li:2,s:15,flip:false},{u:0.30,li:2,s:14,flip:true},
    {u:0.55,li:3,s:21,flip:false},{u:0.16,li:3,s:20,flip:true},{u:0.86,li:3,s:22,flip:false},
    {u:0.40,li:4,s:29,flip:true},{u:0.74,li:4,s:28,flip:false},{u:0.94,li:4,s:27,flip:true},
    {u:0.63,li:4,s:34,flip:false,img:"leb"}     // the GOAT among goats
  ];
  function drawHerd(li,time,par){
    const L=LAYERS[li];
    for(const g of HERD){
      if(g.li!==li) continue;
      const img=(g.img==="leb")?lebImg:goatImg;
      if(!img.complete||!img.naturalWidth) continue;
      const uu=g.u*6.283;
      const y=H*L.y - par + (Math.sin(uu*1.7+time*L.s)+0.55*Math.sin(uu*3.9+time*L.s*0.6+2)+0.3*Math.sin(uu*8.1+1))*H*L.a*0.35;
      const hei=g.s*dpr, wid=hei*img.naturalWidth/img.naturalHeight, x=g.u*W;
      ctx.save();
      if(g.flip){ ctx.translate(x,0); ctx.scale(-1,1); ctx.translate(-x,0); }
      ctx.drawImage(img, x-wid/2, y-hei+1*dpr, wid, hei);
      ctx.restore();
    }
  }
  // fog bank: a feathered clearing painted under the drawer index (measured from layout)
  let fogRects=[];
  setInterval(()=>{
    const rows=document.querySelectorAll("#cover .index-head, #cover .idx");
    fogRects=[...rows].map(n=>n.getBoundingClientRect());
  },400);
  function blob(cx,cy,rx,ry,alpha,inner){
    ctx.save(); ctx.translate(cx,cy); ctx.scale(1,ry/rx);
    const g=ctx.createRadialGradient(0,0,rx*inner,0,0,rx);
    g.addColorStop(0,`rgba(247,249,243,${alpha.toFixed(3)})`);
    g.addColorStop(1,"rgba(247,249,243,0)");
    ctx.fillStyle=g; ctx.fillRect(-rx,-rx,rx*2,rx*2);
    ctx.restore();
  }
  function drawFog(t){
    for(const r of fogRects){
      if(r.bottom<0 || r.top>innerHeight) continue;
      const cx=(r.left+r.width/2)*dpr, cy=(r.top+r.height/2)*dpr;
      const rx=r.width*0.60*dpr, ry=Math.max(r.height*0.66,24)*dpr;
      blob(cx,cy,rx,ry,0.62,0.32);                       // base veil: legibility floor
      const seed=r.top*0.013;                            // each row's mist moves differently
      for(let i=0;i<5;i++){
        const ph=seed+i*1.7;
        const px=(r.left+r.width*(0.12+0.19*i))*dpr + Math.sin(t*0.00018+ph)*r.width*0.05*dpr;
        const py=cy + Math.sin(t*0.00027+ph*1.3)*ry*0.35;
        const prx=rx*(0.17+0.06*Math.sin(t*0.00022+ph*2));
        const pry=ry*(0.75+0.25*Math.sin(t*0.0003+ph));
        const a=0.15+0.11*(0.5+0.5*Math.sin(t*0.00025+ph*1.9));
        blob(px,py,Math.max(prx,8*dpr),Math.max(pry,8*dpr),a,0.15);
      }
    }
  }
  const BIRDS=Array.from({length:4},(_,i)=>({
    x:Math.random(), y:0.13+Math.random()*0.24, sp:0.008+Math.random()*0.012, sz:5+Math.random()*4, ph:Math.random()*6.28
  }));
  function frame(t){
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,"#E9F0EA"); sky.addColorStop(.55,"#F5F3EA"); sky.addColorStop(1,"#EFF1E6");
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
    const time=t*0.00001;
    const sc=(window.scrollY||0)*dpr;
    LAYERS.forEach((L,li)=>{
      const par=sc*(0.03+li*0.045);            // deeper layers drift more with scroll
      ctx.beginPath(); ctx.moveTo(0,H);
      for(let x=0;x<=W;x+=10*dpr){
        const u=x/W*6.283;
        const y=H*L.y - par +(Math.sin(u*1.7+time*L.s)+0.55*Math.sin(u*3.9+time*L.s*0.6+2)+0.3*Math.sin(u*8.1+1))*H*L.a*0.35;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W,H); ctx.closePath();
      ctx.fillStyle=L.c; ctx.fill();
      drawHerd(li,time,par);          // residents stand on their own ridge; nearer ridges pass in front
    });
    drawFog(t);
    // birds — small distant arcs gliding through the sky
    ctx.strokeStyle="rgba(58,78,64,.55)"; ctx.lineWidth=1.1*dpr; ctx.lineCap="round";
    for(const b of BIRDS){
      b.x+=b.sp*0.016; if(b.x>1.06) b.x=-0.06;
      const bx=b.x*W, by=(b.y+0.012*Math.sin(t*0.0006+b.ph))*H;
      const flap=Math.sin(t*0.006+b.ph)*0.55+0.75, s=b.sz*dpr;
      ctx.beginPath();
      ctx.moveTo(bx-s,by); ctx.quadraticCurveTo(bx-s*0.4,by-s*flap*0.7,bx,by);
      ctx.quadraticCurveTo(bx+s*0.4,by-s*flap*0.7,bx+s,by);
      ctx.stroke();
    }
  }
  if(reduceMotion){
    setTimeout(()=>{ const rows=document.querySelectorAll("#cover .index-head, #cover .idx"); fogRects=[...rows].map(n=>n.getBoundingClientRect()); frame(9000); },650);
    frame(9000); return;
  }
  let raf;
  function loop(t){ frame(t); raf=requestAnimationFrame(loop); }
  raf=requestAnimationFrame(loop);
  document.addEventListener("visibilitychange",()=>{ document.hidden ? cancelAnimationFrame(raf) : (raf=requestAnimationFrame(loop)); });
})();

/* ── Appa flight engine ── */
const FLYER = {
  img: IMG_APPA,                      // embedded — to use a different image, replace with "assets/yourfile.png"
  size: 230,                          // Appa width in px on desktop
  rider: {
    img: IMG_PORTRAIT,                // embedded — swap the same way if you update your photo
    mode: "sticker",                  // "sticker" = circular crop · "cutout" = transparent PNG of you
    x: 47,                            // rider center, % from Appa's left edge
    y: 4,                             // rider center, % from Appa's top edge (negative = higher above his back)
    size: 26,                         // rider width as % of Appa's width
    tilt: -7,                         // degrees
    focus: "42% 26%"                  // which part of the photo shows in the sticker
  }
};
(function flight(){
  const F=document.getElementById("flyer");
  const flip=document.getElementById("flyer-flip");
  const inner=document.getElementById("flyer-inner");
  const appa=document.getElementById("flyer-appa");
  const riderWrap=document.getElementById("flyer-rider");
  const riderImg=riderWrap.querySelector("img");
  document.documentElement.style.setProperty("--flyer-w", FLYER.size+"px");
  appa.src=FLYER.img;
  appa.addEventListener("error",()=>F.remove());          // no appa file yet → no flyer
  if(FLYER.rider && FLYER.rider.img){
    riderImg.src=FLYER.rider.img;
    riderImg.addEventListener("error",()=>riderWrap.remove()); // no portrait → appa flies solo
    if(FLYER.rider.mode==="cutout") F.classList.add("cutout");
    const r=FLYER.rider;
    riderWrap.style.width=r.size+"%";
    riderWrap.style.aspectRatio="1/1";
    riderWrap.style.left=(r.x - r.size/2)+"%";
    riderWrap.style.top=(r.y - r.size/2)+"%";
    riderWrap.style.transform=`rotate(${r.tilt}deg)`;
    riderImg.style.objectPosition=r.focus;
  } else riderWrap.remove();
  if(reduceMotion){ F.classList.add("static"); return; }

  // Smooth wandering path (sum-of-sines): full-viewport drift, no tuning, no escapes
  let raf;
  function step(t){
    const W=innerWidth, H=innerHeight;
    const x=W*(0.5+0.38*Math.sin(t*0.000041)+0.07*Math.sin(t*0.000113));
    const y=H*(0.30+0.17*Math.sin(t*0.000059+1.3)+0.05*Math.sin(t*0.000149));
    const dx=0.38*0.000041*Math.cos(t*0.000041)+0.07*0.000113*Math.cos(t*0.000113); // direction only
    const dyv=H*(0.17*0.000059*Math.cos(t*0.000059+1.3)+0.05*0.000149*Math.cos(t*0.000149));
    F.style.transform=`translate(${(x-FLYER.size/2).toFixed(1)}px,${(y-FLYER.size/2.6).toFixed(1)}px)`;
    flip.style.transform=`scaleX(${dx>0?-1:1})`;          // art faces left natively; flip when heading right
    const bank=Math.max(-12,Math.min(12,dyv*2600));
    const bob=Math.sin(t*0.0016)*9;
    const breathe=0.86+0.16*(0.5+0.5*Math.sin(t*0.00023));
    inner.style.transform=`translateY(${bob.toFixed(1)}px) rotate(${bank.toFixed(1)}deg) scale(${breathe.toFixed(3)})`;
    raf=requestAnimationFrame(step);
  }
  raf=requestAnimationFrame(step);
  document.addEventListener("visibilitychange",()=>{ document.hidden ? cancelAnimationFrame(raf) : (raf=requestAnimationFrame(step)); });
})();

/* ── loader ── */
(function loader(){
  const L=document.getElementById("loader");
  let seen=false;
  try{ seen=sessionStorage.getItem("capsule-open")==="1"; }catch(e){}
  if(reduceMotion || seen){ L.classList.add("done"); return; }
  const fill=document.getElementById("loadfill"), pct=document.getElementById("loadpct");
  const DUR=2800, t0=performance.now();
  let raf, doneFlag=false;
  function finish(){
    if(doneFlag) return; doneFlag=true;
    cancelAnimationFrame(raf);
    L.classList.add("done");
    try{ sessionStorage.setItem("capsule-open","1"); }catch(e){}
  }
  function step(t){
    const p=Math.min(1,(t-t0)/DUR);
    const eased=1-Math.pow(1-p,2.2);
    fill.style.width=(eased*100)+"%";
    pct.textContent=Math.round(eased*100)+"%";
    if(p>=1) finish(); else raf=requestAnimationFrame(step);
  }
  raf=requestAnimationFrame(step);
  L.addEventListener("click",finish);
})();

/* ── cover ── */
function meterRow(kind){
  let out="";
  if(kind==="scan"){ for(let i=0;i<40;i++) out+=`<span class="scan">˘ ¯ </span>`; }
  else{
    const vals=["+0.42%","−0.18%","+1.07%","−0.63%","+0.09%","+2.14%","−1.31%","+0.77%"];
    for(let i=0;i<14;i++){ const v=vals[i%vals.length]; out+=`<span class="${v[0]==="+"?"up":"dn"}">${v}</span><span class="scan"> · </span>`; }
  }
  return out;
}
function renderCover(){
  const c=CONTENT.cover;
  const s=el("section"); s.id="cover";
  const man=el("div","manifest");
  man.appendChild(el("span",null,esc(c.manifestLeft)));
  man.appendChild(el("span",null,`<span class="live">●</span> NEW YORK — <span id="clk"></span>`));
  window.__clkTimer && clearInterval(window.__clkTimer);
  const updClk=()=>{const n=document.getElementById("clk"); if(n) n.textContent=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})+" ET";};
  updClk(); window.__clkTimer=setInterval(updClk,30000);
  s.appendChild(man);

  const name=el("h1","bigname");
  let chIdx=0;
  c.nameLines.forEach(ln=>{
    const line=el("span","ln");
    [...ln].forEach(ch=>{ const sp=el("span","ch",ch===" "?"&nbsp;":esc(ch)); sp.style.animationDelay=(chIdx++*55)+"ms"; line.appendChild(sp); });
    name.appendChild(line);
  });
  s.appendChild(name);

  const role=el("p","roleline",`I like <b id="rolecycle">${esc(c.roles[0])}</b>`);
  s.appendChild(role);
  s.appendChild(el("p","coverbio",c.bio)); // bio allows inline HTML intentionally

  const idx=el("div","index");
  idx.appendChild(el("div","index-head",esc(c.indexHead)));
  CONTENT.tabs.forEach(t=>{
    const a=el("a","idx");
    a.href="#"+t.id;
    a.innerHTML=`<span class="code">${esc(t.code)}</span><span class="name">${esc(t.name)}</span><span class="count">${esc(t.blurb)}</span><span class="arrow">→</span>`;
    idx.appendChild(a);
  });
  s.appendChild(idx);


  $view.appendChild(s);

  if(!reduceMotion){
    const chars=[...name.querySelectorAll(".ch")];
    let centers=[], px=0, py=0, over=false, pending=0;
    function measure(){                        // measure once, with transforms cleared
      chars.forEach(c=>c.style.transform="");
      requestAnimationFrame(()=>{
        centers=chars.map(ch=>{ const r=ch.getBoundingClientRect(); return {x:r.left+r.width/2, y:r.top+r.height/2}; });
      });
    }
    setTimeout(measure, 950);                  // after the entrance animation settles
    window.__nameMeasure && window.removeEventListener("resize", window.__nameMeasure);
    window.__nameMeasure = measure;
    window.addEventListener("resize", measure);
    function apply(){
      pending=0;
      for(let i=0;i<chars.length;i++){
        const c=centers[i];
        if(!c || !over){ chars[i].style.transform=""; continue; }
        const dx=px-c.x, dy=py-c.y, dist=Math.hypot(dx,dy)||1, max=180;
        if(dist<max){ const f=(1-dist/max)*26; chars[i].style.transform=`translate(${-dx/dist*f}px,${-dy/dist*f}px) rotate(${(dx>0?-1:1)*f*0.25}deg)`; }
        else chars[i].style.transform="";
      }
    }
    name.addEventListener("mousemove",e=>{ px=e.clientX; py=e.clientY; over=true; if(!pending) pending=requestAnimationFrame(apply); });
    name.addEventListener("mouseleave",()=>{ over=false; if(!pending) pending=requestAnimationFrame(apply); });
    let i=0; const rc=role.querySelector("#rolecycle");
    window.__roleTimer && clearInterval(window.__roleTimer);
    window.__roleTimer=setInterval(()=>{ i=(i+1)%CONTENT.cover.roles.length; rc.textContent=CONTENT.cover.roles[i]; },1800);
  }
}

  w.research.forEach(it=>{
    const r=el("article","pubrow");
    r.appendChild(el("div","meta-row",`<span class="code">${esc(it.code)}</span><span>${esc(it.venue)}</span><span>${esc(it.year)}</span>`));
    r.appendChild(el("h3",null,esc(it.title)));
    r.appendChild(el("p",null,esc(it.note)));
    const a=el("a","readbtn","View the presentation ↗"); a.href=it.url; a.target="_blank"; a.rel="noopener";
    r.appendChild(a);
    p.appendChild(r);
  });

  p.appendChild(subhead("Poems","the music"));
  const toc=el("div","poemtoc");
  w.poems.forEach(it=>{
    const b=el("button","poemlink",`<span class="code">${esc(it.code)}</span>${esc(it.title)}`);
    b.addEventListener("click",()=>{
      const t=document.getElementById("poem-"+it.code.replace(/\s/g,""));
      t && t.scrollIntoView({behavior:reduceMotion?"auto":"smooth",block:"start"});
    });
    toc.appendChild(b);
  });
  p.appendChild(toc);
  w.poems.forEach(it=>{ const d=poemBlock(it); d.id="poem-"+it.code.replace(/\s/g,""); p.appendChild(d); });

  p.appendChild(subhead("Essays","everything else"));
  w.essays.forEach(it=>p.appendChild(essayCard(it)));
  $view.appendChild(p);
}

/* ── contact ── */
function renderContact(){
  const c=CONTENT.contact, p=el("div","page");
  p.appendChild(secHead(c.stage,c.title));
  p.appendChild(el("p","contact-big",`${esc(c.big[0])}<br><em>${esc(c.big[1])}</em><br>${esc(c.big[2])}`));
  const rows=el("div","contact-rows");
  c.rows.forEach(r=>{
    const row=el("div","crow");
    row.appendChild(el("span","k",esc(r.k)));
    const a=el("a",null,esc(r.v)); a.href=r.url; a.rel="noopener"; row.appendChild(a);
    rows.appendChild(row);
  });
  p.appendChild(rows);
  $view.appendChild(p);
}

/* ── reveal engine ── */
function revealify(){
  const els=$view.querySelectorAll(".sec-head,.sec-intro,.subhead,.subhead-rule,.role,.card,.essay,.poem,.pursuit,.toolcol,.edu,.prose,.sidebox,.contact-big,.crow,.idx,.coverbio,.roleline,.manifest");
  els.forEach((e,i)=>{
    e.classList.add("rv");
    e.style.transitionDelay=Math.min(i*45,500)+"ms";
    requestAnimationFrame(()=>requestAnimationFrame(()=>e.classList.add("rv-in")));
  });
}

/* ── router ── */
const ROUTES={ home:renderCover, about:renderAbout, work:renderWork, writing:renderWriting, contact:renderContact };
function show(route){
  if(!ROUTES[route]) route="home";
  window.__roleTimer && clearInterval(window.__roleTimer);
  document.body.classList.toggle("inner", route!=="home");
  $view.innerHTML="";
  renderNav(route);
  ROUTES[route]();
  revealify();
  window.scrollTo(0,0);
}
function renderFooter(){
  const f=document.getElementById("footer-inner");
  f.appendChild(el("span",null,esc(CONTENT.footer.left)));
  f.appendChild(el("span",null,esc(CONTENT.footer.right)));
}
window.addEventListener("hashchange",()=>show(location.hash.slice(1)||"home"));
window.__go=show; // test hook
renderFooter();
show(location.hash.slice(1)||"home");
</script>
</body>
