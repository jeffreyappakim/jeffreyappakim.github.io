<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeffrey Kim — A Capsule</title>
<meta name="description" content="The capsule of Jeffrey Kim — analyst, poet, builder. Work, writing, and pursuits, archived while they happen.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=Albert+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- ══════════════════════════════════════════════════════════════════
     THE CAPSULE v3 — HOW TO EDIT
     ══════════════════════════════════════════════════════════════════
     ALL content lives in the CONTENT object (search "const CONTENT").

       CONTENT.cover            → landing page
       CONTENT.work             → experience, projects, toolkit, education
       CONTENT.writing.essays   → essays   (add objects to the array)
       CONTENT.writing.poems    → poems    (add objects to the array)
       CONTENT.pursuits         → fitness / guitar / piano journeys
       CONTENT.contact          → contact rows

     Entries marked [SAMPLE] show the format — replace and delete tag.

     PUBLISHING: repo named  yourusername.github.io  → upload this file
     as index.html + Jeffrey_Kim_Resume.pdf → done.

     ⚠ SEG work is described without deal-target names or financials.
     ⚠ For Columbia admissions essays, prefer excerpts over full text.
     ══════════════════════════════════════════════════════════════════ -->

<style>
:root{
  --abyss:#060B09;
  --deep:#0A130E;
  --pane:#0E1913;
  --pane-2:#122019;
  --line:#1E3128;
  --line-soft:#172620;
  --mist:#8FA69C;
  --fog:#C7D4CE;
  --bone:#E9F0EB;
  --accent:#2FA97D;
  --accent-dim:#1C6B50;
  --jade:#0E4A38;
  --maxw:1040px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation:none!important;transition:none!important}
}
body{
  font-family:'Newsreader',Georgia,serif;font-weight:300;
  line-height:1.65;font-size:17px;color:var(--fog);background:var(--abyss);
}
::selection{background:var(--accent);color:var(--abyss)}
a{color:inherit;text-decoration:none}
button{font:inherit;background:none;border:none;cursor:pointer;color:inherit}
a:focus-visible,button:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px}
.sans{font-family:'Albert Sans',system-ui,sans-serif}

/* ── Generative background ───────────────────────────────────────── */
#bg{position:fixed;inset:0;z-index:-2;background:var(--abyss)}
#bg-glow{
  position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(1300px 820px at 50% 8%, rgba(22,132,98,.34), transparent 64%),
    radial-gradient(800px 560px at 22% 34%, rgba(14,90,68,.22), transparent 60%),
    linear-gradient(180deg, transparent 42%, rgba(2,5,4,.68) 100%),
    radial-gradient(1500px 1100px at 50% 46%, transparent 42%, rgba(2,5,4,.6) 100%);
}

/* ── Appa flyer ──────────────────────────────────────────────────── */
#flyer{position:fixed;left:0;top:0;z-index:0;pointer-events:none;will-change:transform}
#flyer-flip{transition:transform .7s ease}
#flyer-inner{position:relative;filter:drop-shadow(0 18px 34px rgba(0,0,0,.55));will-change:transform}
#flyer-appa{display:block;width:var(--flyer-w,170px)}
#flyer-rider{
  position:absolute;overflow:hidden;border-radius:50%;
  border:2px solid rgba(233,240,235,.75);
  box-shadow:0 4px 14px rgba(0,0,0,.5), 0 0 0 3px rgba(6,11,9,.35);
}
#flyer-rider img{width:100%;height:100%;object-fit:cover;display:block}
#flyer.cutout #flyer-rider{border-radius:0;border:none;box-shadow:none;overflow:visible}
#flyer.static{left:auto;right:44px;top:110px}
@media (max-width:900px){#flyer{--flyer-w:96px}}
main,footer{position:relative;z-index:1}

/* ── Loader ──────────────────────────────────────────────────────── */
#loader{
  position:fixed;inset:0;z-index:100;background:var(--abyss);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  cursor:pointer;transition:opacity .7s ease, visibility .7s;
}
#loader.done{opacity:0;visibility:hidden;pointer-events:none}
#loader .word{
  font-family:'Fraunces',serif;font-weight:300;font-style:italic;
  font-size:clamp(26px,4vw,44px);color:var(--bone);letter-spacing:.02em;
}
#loader .word .accent{color:var(--accent);font-style:normal}
#loader .bar{width:min(300px,60vw);height:1px;background:var(--line);position:relative;overflow:visible}
#loader .bar i{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--accent);box-shadow:0 0 14px rgba(47,169,125,.7)}
#loader .pct{font-family:'Albert Sans',sans-serif;font-size:11px;letter-spacing:.32em;color:var(--mist)}
#loader .skip{font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.3em;color:var(--line);text-transform:uppercase;margin-top:10px}

/* ── Top nav ─────────────────────────────────────────────────────── */
#topnav{
  position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:6px;
  padding:16px 30px;border-bottom:1px solid var(--line-soft);
  background:rgba(10,15,13,.72);backdrop-filter:blur(10px);
}
#topnav .brand{font-family:'Fraunces',serif;font-size:15px;font-style:italic;color:var(--bone);margin-right:auto;letter-spacing:.02em}
#topnav .brand b{color:var(--accent);font-weight:400}
.navlink{
  font-family:'Albert Sans',sans-serif;font-size:10.5px;letter-spacing:.22em;
  text-transform:uppercase;padding:7px 13px;color:var(--mist);
  border:1px solid transparent;border-radius:2px;transition:all .18s;
}
.navlink:hover{color:var(--bone);border-color:var(--line)}
.navlink.on{color:var(--abyss);background:var(--accent);border-color:var(--accent);font-weight:600}

/* ── Cover ───────────────────────────────────────────────────────── */
#cover{min-height:calc(100vh - 58px);display:flex;flex-direction:column;padding:34px 30px 0;max-width:1500px;margin:0 auto;width:100%}
.manifest{
  display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;
  font-family:'Albert Sans',sans-serif;font-size:11.5px;font-weight:500;letter-spacing:.2em;
  color:var(--fog);text-transform:uppercase;margin-bottom:10px;
}
.manifest .live{color:var(--accent)}
.meter{
  font-family:'Albert Sans',sans-serif;font-size:11.5px;letter-spacing:.22em;
  color:var(--line);white-space:nowrap;overflow:hidden;user-select:none;
  padding:11px 0;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);
}
.meter .up{color:#4CBE93}.meter .dn{color:#6E7D75}.meter .scan{color:#3A5147}
.bigname{
  font-family:'Gloock',serif;font-weight:400;
  font-size:clamp(62px,12.5vw,186px);line-height:.95;letter-spacing:-.015em;
  margin:auto 0 10px;padding-top:36px;user-select:none;color:var(--bone);
}
.bigname .ln{display:block}
.bigname .ch{display:inline-block;transition:transform .4s cubic-bezier(.2,.8,.2,1), color .4s;will-change:transform}
.bigname .ch:hover{color:var(--accent)}
.roleline{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:clamp(16px,2vw,22px);color:var(--mist);margin-bottom:28px;
}
.roleline b{color:var(--accent);font-weight:400;border-bottom:1px solid var(--accent-dim);padding-bottom:1px}
.coverbio{max-width:560px;font-size:19px;color:var(--fog);margin-bottom:46px;font-weight:300}
.coverbio .hi{font-family:'Fraunces',serif;font-style:italic;color:var(--bone)}

.index{border-top:1px solid var(--line-soft);margin-bottom:40px}
.index-head{
  font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.34em;
  color:var(--accent);text-transform:uppercase;padding:16px 2px 6px;
}
.idx{
  display:grid;grid-template-columns:96px 1fr auto 30px;gap:20px;align-items:baseline;
  width:100%;text-align:left;padding:17px 2px;border-bottom:1px solid var(--line-soft);
  transition:padding-left .25s, background .25s;
}
.idx:hover{padding-left:18px;background:rgba(47,169,125,.045)}
.idx .code{font-family:'Albert Sans',sans-serif;font-size:10px;color:var(--accent);letter-spacing:.24em}
.idx .name{font-family:'Gloock',serif;font-weight:400;font-size:clamp(24px,3.2vw,38px);line-height:1.02;color:var(--bone)}
.idx .count{font-family:'Albert Sans',sans-serif;font-size:10px;color:var(--mist);letter-spacing:.2em;text-transform:uppercase}
.idx .arrow{color:var(--mist);transition:transform .25s,color .25s;font-family:'Albert Sans',sans-serif}
.idx:hover .arrow{transform:translateX(7px);color:var(--accent)}

.marq{overflow:hidden;border-top:1px solid var(--line-soft);padding:13px 0 17px;white-space:nowrap;user-select:none}
.marq .inner{display:inline-block;font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:19px;color:var(--mist);animation:slide 30s linear infinite}
@keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@media (prefers-reduced-motion:reduce){.marq .inner{animation:none}}

/* ── Interior shared ─────────────────────────────────────────────── */
.page{max-width:var(--maxw);margin:0 auto;padding:66px 30px 96px}
.sec-head{display:flex;align-items:baseline;gap:20px;margin-bottom:12px;border-bottom:1px solid var(--line);padding-bottom:16px}
.sec-stage{font-family:'Albert Sans',sans-serif;font-size:10px;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;white-space:nowrap}
.sec-title{font-family:'Gloock',serif;font-weight:400;font-size:clamp(34px,4.8vw,54px);line-height:1;color:var(--bone)}
.sec-note{font-family:'Albert Sans',sans-serif;font-size:10px;letter-spacing:.2em;color:var(--mist);margin-left:auto;white-space:nowrap;text-transform:uppercase}
.sec-intro{max-width:640px;color:var(--mist);margin:18px 0 44px;font-size:17px}
.subhead{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:26px;color:var(--bone);
  margin:64px 0 6px;
}
.subhead-rule{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.subhead-rule .tag{font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.28em;color:var(--accent-dim);text-transform:uppercase;white-space:nowrap}
.subhead-rule i{flex:1;height:1px;background:var(--line-soft)}
.sample{font-family:'Albert Sans',sans-serif;font-size:9px;color:var(--abyss);background:var(--accent);padding:2px 9px;letter-spacing:.2em;vertical-align:middle;border-radius:2px;font-weight:600}

/* work */
.role{border:1px solid var(--line);background:linear-gradient(180deg,var(--pane) 0%,var(--deep) 100%);padding:30px 32px;margin-bottom:22px;position:relative;border-radius:3px}
.role::before{content:attr(data-idx);position:absolute;top:-10px;left:24px;font-family:'Albert Sans',sans-serif;font-size:9px;letter-spacing:.24em;background:var(--abyss);border:1px solid var(--line);color:var(--accent-dim);padding:2px 12px;border-radius:2px}
.role-top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:4px}
.role h3{font-family:'Fraunces',serif;font-weight:400;font-size:25px;color:var(--bone)}
.role .org{color:var(--accent);font-style:italic;font-weight:300}
.role .dates{font-family:'Albert Sans',sans-serif;font-size:10.5px;letter-spacing:.18em;color:var(--mist);padding-top:10px;text-transform:uppercase}
.role .summary{color:var(--mist);margin:8px 0 16px;max-width:700px}
.role ul{list-style:none}
.role li{padding:9px 0 9px 28px;position:relative;font-size:15.5px;color:var(--fog);border-top:1px solid var(--line-soft)}
.role li::before{content:"◇";position:absolute;left:2px;color:var(--accent-dim);font-size:11px;top:13px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.card{border:1px solid var(--line);background:linear-gradient(180deg,var(--pane) 0%,var(--deep) 100%);padding:26px 26px 20px;position:relative;display:flex;flex-direction:column;gap:12px;border-radius:3px;transition:transform .2s, border-color .2s, box-shadow .2s}
.card:hover{transform:translateY(-4px);border-color:var(--accent-dim);box-shadow:0 14px 34px rgba(0,0,0,.45), 0 0 0 1px rgba(47,169,125,.12)}
.card .ws{font-family:'Albert Sans',sans-serif;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-dim);padding:3px 10px;width:fit-content;border-radius:2px}
.card h3{font-family:'Fraunces',serif;font-weight:400;font-size:22px;line-height:1.15;color:var(--bone)}
.card p{font-size:15px;color:var(--mist);flex:1}
.card .stack{display:flex;flex-wrap:wrap;gap:6px;padding-top:8px;border-top:1px solid var(--line-soft)}
.card .stack span{font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.14em;color:var(--mist);border:1px solid var(--line);padding:2px 9px;border-radius:2px;text-transform:uppercase}
.tools{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.toolcol{border-top:1px solid var(--accent-dim);padding-top:16px}
.toolcol h3{font-family:'Albert Sans',sans-serif;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.toolcol li{list-style:none;font-size:15px;color:var(--fog);padding:7px 0;border-bottom:1px solid var(--line-soft)}
.toolcol li:last-child{border-bottom:none}
.edu{border-left:2px solid var(--accent-dim);padding:8px 0 8px 26px;margin-bottom:18px}
.edu h3{font-family:'Fraunces',serif;font-weight:400;font-size:23px;color:var(--bone)}
.edu .meta{font-family:'Albert Sans',sans-serif;font-size:10.5px;letter-spacing:.16em;color:var(--accent-dim);margin:4px 0 8px;text-transform:uppercase}
.edu p{font-size:15px;color:var(--mist);max-width:680px}

/* writing */
.essay{border:1px solid var(--line);background:linear-gradient(180deg,var(--pane) 0%,var(--deep) 100%);margin-bottom:20px;padding:28px 30px;border-radius:3px}
.essay .meta-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:10px;font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mist)}
.essay .meta-row .code{color:var(--accent)}
.essay .meta-row .award{color:var(--accent);border:1px solid var(--accent-dim);padding:2px 9px;border-radius:2px}
.essay h3{font-family:'Fraunces',serif;font-weight:400;font-size:27px;line-height:1.15;margin-bottom:10px;color:var(--bone)}
.essay .excerpt{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:18px;color:var(--fog);border-left:2px solid var(--accent);padding-left:20px;margin:16px 0}
.essay .full{display:none;margin-top:18px;color:var(--fog);white-space:pre-wrap;border-top:1px solid var(--line-soft);padding-top:18px;font-size:16px}
.essay.open .full{display:block}
.readbtn{font-family:'Albert Sans',sans-serif;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-dim);padding:8px 16px;border-radius:2px;transition:all .18s}
.readbtn:hover{background:var(--accent);color:var(--abyss)}
.xonly{font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.24em;color:var(--mist);text-transform:uppercase}
.poem{max-width:620px;margin:0 auto 78px}
.poem .meta-row{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-family:'Albert Sans',sans-serif;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mist);border-bottom:1px solid var(--line-soft);padding-bottom:10px;margin-bottom:24px}
.poem .meta-row .venue{color:var(--accent-dim)}
.poem h3{font-family:'Fraunces',serif;font-weight:400;font-size:30px;margin-bottom:20px;color:var(--bone)}
.poem .verse{font-family:'Newsreader',serif;font-size:19px;line-height:1.85;white-space:pre-wrap;color:var(--fog)}
.poem .scanmark{font-family:'Albert Sans',sans-serif;color:var(--line);font-size:11px;letter-spacing:.5em;margin-top:24px;user-select:none}

/* pursuits */
.pursuit{border:1px solid var(--line);background:linear-gradient(180deg,var(--pane) 0%,var(--deep) 100%);padding:30px 32px;margin-bottom:26px;border-radius:3px}
.pursuit .top{display:flex;justify-content:space-between;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.pursuit h3{font-family:'Fraunces',serif;font-weight:400;font-size:29px;color:var(--bone)}
.pursuit .since{font-family:'Albert Sans',sans-serif;font-size:10px;color:var(--accent-dim);letter-spacing:.26em;text-transform:uppercase}
.pursuit .status{color:var(--mist);max-width:660px;margin-bottom:20px}
.statrow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.stat{border:1px solid var(--line);padding:12px 18px;min-width:112px;border-radius:3px;background:rgba(47,169,125,.03)}
.stat .v{font-family:'Fraunces',serif;font-weight:300;font-size:26px;line-height:1.1;color:var(--bone)}
.stat .k{font-family:'Albert Sans',sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--mist)}
.tl{border-left:1px solid var(--line);margin-left:6px;padding-left:26px}
.tl-item{position:relative;padding:0 0 20px}
.tl-item::before{content:"";position:absolute;left:-30.5px;top:8px;width:8px;height:8px;border-radius:50%;background:var(--abyss);border:1.5px solid var(--accent);box-shadow:0 0 8px rgba(47,169,125,.35)}
.tl-item .d{font-family:'Albert Sans',sans-serif;font-size:10px;color:var(--accent);letter-spacing:.22em;text-transform:uppercase}
.tl-item .t{font-size:15.5px;color:var(--fog)}

/* about */
.about-grid{display:grid;grid-template-columns:1.45fr 1fr;gap:48px;align-items:start}
.prose{color:var(--fog);font-size:17px;max-width:600px;margin-bottom:8px}
.portrait{
  width:100%;max-width:340px;display:block;border:1px solid var(--line);border-radius:3px;
  filter:saturate(.85) contrast(1.02);margin-bottom:26px;
  box-shadow:0 18px 44px rgba(0,0,0,.5);
  aspect-ratio:4/5;object-fit:cover;object-position:35% 22%;  /* crops the right side & top glare of the current photo */
}
.sidebox{border:1px solid var(--line);background:linear-gradient(180deg,var(--pane) 0%,var(--deep) 100%);padding:22px 24px;border-radius:3px;margin-bottom:20px}
.sidebox h3{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:20px;color:var(--bone);margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chips span{font-family:'Albert Sans',sans-serif;font-size:10px;letter-spacing:.14em;color:var(--fog);border:1px solid var(--line);padding:4px 11px;border-radius:2px;text-transform:uppercase}
.chips span:hover{border-color:var(--accent-dim);color:var(--accent)}

/* contact */
.contact-big{font-family:'Gloock',serif;font-weight:400;font-size:clamp(32px,4.6vw,54px);line-height:1.14;max-width:760px;margin:22px 0 36px;color:var(--bone)}
.contact-big em{font-style:italic;color:var(--accent)}
.contact-rows{max-width:540px}
.crow{display:flex;justify-content:space-between;gap:16px;padding:15px 2px;border-bottom:1px solid var(--line-soft);font-size:16px}
.crow a{color:var(--accent);border-bottom:1px solid transparent;transition:border-color .15s}
.crow a:hover{border-bottom-color:var(--accent)}
.crow .k{font-family:'Albert Sans',sans-serif;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--mist);padding-top:5px}

footer{border-top:1px solid var(--line-soft);padding:22px 30px;background:rgba(10,15,13,.6)}
footer .in{max-width:var(--maxw);margin:0 auto;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-family:'Albert Sans',sans-serif;font-size:9.5px;color:var(--mist);letter-spacing:.18em;text-transform:uppercase}

noscript{display:block;padding:40px;color:var(--fog);font-family:monospace}

@media (max-width:900px){.grid,.tools,.about-grid{grid-template-columns:1fr}}
@media (max-width:680px){
  #topnav{padding:12px 16px;flex-wrap:wrap}
  #cover{padding:24px 16px 0}
  .page{padding:48px 16px 72px}
  .idx{grid-template-columns:64px 1fr;grid-template-rows:auto auto}
  .idx .count{grid-column:2}
  .idx .arrow{display:none}
}
</style>
</head>
<body>

<canvas id="bg" aria-hidden="true"></canvas>
<div id="bg-glow" aria-hidden="true"></div>

<!-- Appa + rider: flies behind the content. Tune in the FLYER config below. -->
<div id="flyer" aria-hidden="true">
  <div id="flyer-flip">
    <div id="flyer-inner">
      <img id="flyer-appa" alt="">
      <div id="flyer-rider"><img alt=""></div>
    </div>
  </div>
</div>

<div id="loader" role="status" aria-label="Opening the capsule">
  <div class="word">opening <span class="accent">the capsule</span></div>
  <div class="bar"><i id="loadfill"></i></div>
  <div class="pct" id="loadpct">0%</div>
  <div class="skip">CLICK TO SKIP</div>

const $view = document.getElementById("view");
const el = (t,c,h)=>{const n=document.createElement(t);if(c)n.className=c;if(h!==undefined)n.innerHTML=h;return n};

/* ── generative background: flowing wave-line ribbons ── */
(function bg(){
  const cv=document.getElementById("bg");
  const ctx=cv.getContext && cv.getContext("2d");
  if(!ctx) return;
  let W,H,dpr;
  function size(){
    dpr=Math.min(window.devicePixelRatio||1,1.5);
    W=cv.width=Math.floor(innerWidth*dpr); H=cv.height=Math.floor(innerHeight*dpr);
    cv.style.width=innerWidth+"px"; cv.style.height=innerHeight+"px";
  }
  const FLIES=42; let flies=[];
  function seedFlies(){
    flies=Array.from({length:FLIES},()=>({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.18*dpr, vy:(Math.random()-.5)*.14*dpr,
      ph:Math.random()*6.28, sp:.6+Math.random()*1.2, r:(.9+Math.random()*1.5)*dpr
    }));
  }
  size(); seedFlies();
  window.addEventListener("resize",()=>{ size(); seedFlies(); });
  const LINES=30, STEP=14;
  function frame(t){
    ctx.fillStyle="#060B09"; ctx.fillRect(0,0,W,H);
    const time=t*0.00013, step=STEP*dpr;
    for(let i=0;i<LINES;i++){
      const p=i/(LINES-1);
      // ribbons cluster into a band that slowly drifts vertically
      const band=H*(0.42+0.18*Math.sin(time*0.5));
      const spread=H*0.34*(0.35+0.65*Math.abs(Math.sin(p*3.14159)));
      const baseY=band+(p-0.5)*spread*2;
      const amp=(26+52*Math.abs(Math.sin(p*2.6+time*0.8)))*dpr;
      ctx.beginPath();
      for(let x=0;x<=W+step;x+=step){
        const y=baseY
          + Math.sin(x*0.0016/dpr + time*2.1 + i*0.32)*amp
          + Math.sin(x*0.00062/dpr - time*1.5 + i*0.85)*amp*0.62;
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      const lum=0.045+0.075*Math.pow(Math.sin(p*3.14159),2)+0.03*Math.sin(i*0.7+time*2.4);
      const g=132+Math.round(52*Math.sin(p*2.2+0.4));
      ctx.strokeStyle=`rgba(30,${g},${Math.round(g*0.76)},${Math.max(0.02,lum).toFixed(3)})`;
      ctx.lineWidth=(0.8+0.7*Math.pow(Math.sin(p*3.14159),2))*dpr;
      ctx.stroke();
    }
    // fireflies
    for(const f of flies){
      f.vx+=(Math.random()-.5)*.02*dpr; f.vy+=(Math.random()-.5)*.02*dpr;
      f.vx*=.985; f.vy*=.985; f.x+=f.vx; f.y+=f.vy;
      if(f.x<-20)f.x=W+20; if(f.x>W+20)f.x=-20;
      if(f.y<-20)f.y=H+20; if(f.y>H+20)f.y=-20;
      const tw=Math.max(0,Math.sin(t*0.001*f.sp+f.ph));
      const a=Math.pow(tw,3);
      if(a<0.03) continue;
      ctx.beginPath(); ctx.fillStyle=`rgba(186,230,118,${(a*0.10).toFixed(3)})`;
      ctx.arc(f.x,f.y,f.r*3.4,0,6.2832); ctx.fill();
      ctx.beginPath(); ctx.fillStyle=`rgba(214,240,146,${(a*0.85).toFixed(3)})`;
      ctx.arc(f.x,f.y,f.r,0,6.2832); ctx.fill();
    }
  }
  if(reduceMotion){ frame(9000); return; }
  let raf;
  function loop(t){ frame(t); raf=requestAnimationFrame(loop); }
  raf=requestAnimationFrame(loop);
  document.addEventListener("visibilitychange",()=>{ document.hidden ? cancelAnimationFrame(raf) : (raf=requestAnimationFrame(loop)); });
})();

/* ── Appa flight engine ── */
const FLYER = {
  img: IMG_APPA,                      // embedded — to use a different image, replace with "assets/yourfile.png"
  size: 170,                          // Appa width in px on desktop
  rider: {
    img: IMG_PORTRAIT,                // embedded — swap the same way if you update your photo
    mode: "sticker",                  // "sticker" = circular crop · "cutout" = transparent PNG of you
    x: 47,                            // rider center, % from Appa's left edge
    y: 4,                             // rider center, % from Appa's top edge (negative = higher above his back)
    size: 26,                         // rider width as % of Appa's width
    tilt: -7,                         // degrees
    focus: "42% 26%"                  // which part of the photo shows in the sticker
  }
};
(function flight(){
  const F=document.getElementById("flyer");
  const flip=document.getElementById("flyer-flip");
  const inner=document.getElementById("flyer-inner");
  const appa=document.getElementById("flyer-appa");
  const riderWrap=document.getElementById("flyer-rider");
  const riderImg=riderWrap.querySelector("img");
  document.documentElement.style.setProperty("--flyer-w", FLYER.size+"px");
  appa.src=FLYER.img;
  appa.addEventListener("error",()=>F.remove());          // no appa file yet → no flyer
  if(FLYER.rider && FLYER.rider.img){
    riderImg.src=FLYER.rider.img;
    riderImg.addEventListener("error",()=>riderWrap.remove()); // no portrait → appa flies solo
    if(FLYER.rider.mode==="cutout") F.classList.add("cutout");
    const r=FLYER.rider;
    riderWrap.style.width=r.size+"%";
    riderWrap.style.aspectRatio="1/1";
    riderWrap.style.left=(r.x - r.size/2)+"%";
    riderWrap.style.top=(r.y - r.size/2)+"%";
    riderWrap.style.transform=`rotate(${r.tilt}deg)`;
    riderImg.style.objectPosition=r.focus;
  } else riderWrap.remove();
  if(reduceMotion){ F.classList.add("static"); return; }

  // Smooth wandering path (sum-of-sines): full-viewport drift, no tuning, no escapes
  let raf;
  function step(t){
    const W=innerWidth, H=innerHeight;
    const x=W*(0.5+0.38*Math.sin(t*0.000041)+0.07*Math.sin(t*0.000113));
    const y=H*(0.30+0.17*Math.sin(t*0.000059+1.3)+0.05*Math.sin(t*0.000149));
    const dx=0.38*0.000041*Math.cos(t*0.000041)+0.07*0.000113*Math.cos(t*0.000113); // direction only
    const dyv=H*(0.17*0.000059*Math.cos(t*0.000059+1.3)+0.05*0.000149*Math.cos(t*0.000149));
    F.style.transform=`translate(${(x-FLYER.size/2).toFixed(1)}px,${(y-FLYER.size/2.6).toFixed(1)}px)`;
    flip.style.transform=`scaleX(${dx>0?-1:1})`;          // art faces left natively; flip when heading right
    const bank=Math.max(-12,Math.min(12,dyv*2600));
    const bob=Math.sin(t*0.0016)*9;
    const breathe=0.86+0.16*(0.5+0.5*Math.sin(t*0.00023));
    inner.style.transform=`translateY(${bob.toFixed(1)}px) rotate(${bank.toFixed(1)}deg) scale(${breathe.toFixed(3)})`;
    raf=requestAnimationFrame(step);
  }
  raf=requestAnimationFrame(step);
  document.addEventListener("visibilitychange",()=>{ document.hidden ? cancelAnimationFrame(raf) : (raf=requestAnimationFrame(step)); });
})();

/* ── loader ── */
(function loader(){
  const L=document.getElementById("loader");
  let seen=false;
  try{ seen=sessionStorage.getItem("capsule-open")==="1"; }catch(e){}
  if(reduceMotion || seen){ L.classList.add("done"); return; }
  const fill=document.getElementById("loadfill"), pct=document.getElementById("loadpct");
  const DUR=2800, t0=performance.now();
  let raf, doneFlag=false;
  function finish(){
    if(doneFlag) return; doneFlag=true;
    cancelAnimationFrame(raf);
    L.classList.add("done");
    try{ sessionStorage.setItem("capsule-open","1"); }catch(e){}
  }
  function step(t){
    const p=Math.min(1,(t-t0)/DUR);
    const eased=1-Math.pow(1-p,2.2);
    fill.style.width=(eased*100)+"%";
    pct.textContent=Math.round(eased*100)+"%";
    if(p>=1) finish(); else raf=requestAnimationFrame(step);
  }
  raf=requestAnimationFrame(step);
  L.addEventListener("click",finish);
})();

  else{
    const vals=["+0.42%","−0.18%","+1.07%","−0.63%","+0.09%","+2.14%","−1.31%","+0.77%"];
    for(let i=0;i<14;i++){ const v=vals[i%vals.length]; out+=`<span class="${v[0]==="+"?"up":"dn"}">${v}</span><span class="scan"> · </span>`; }

    const chars=[...name.querySelectorAll(".ch")];

      chars.forEach(ch=>{
        const r=ch.getBoundingClientRect();
        const dx=e.clientX-(r.left+r.width/2), dy=e.clientY-(r.top+r.height/2);
        const dist=Math.hypot(dx,dy), max=180;
        if(dist<max){ const f=(1-dist/max)*26; ch.style.transform=`translate(${-dx/dist*f}px,${-dy/dist*f}px) rotate(${(dx>0?-1:1)*f*0.25}deg)`; }

    });
    name.addEventListener("mouseleave",()=>chars.forEach(ch=>ch.style.transform=""));

    window.__roleTimer && clearInterval(window.__roleTimer);
    window.__roleTimer=setInterval(()=>{ i=(i+1)%CONTENT.cover.roles.length; rc.textContent=CONTENT.cover.roles[i]; },1800);
  }
}

    d.appendChild(el("h3",null,esc(e.school)));
    d.appendChild(el("div","meta",esc(e.meta)));
    d.appendChild(el("p",null,esc(e.note)));
    p.appendChild(d);
  });
  $view.appendChild(p);
}

/* ── writing (essays + poems) ── */
function renderWriting(){
  const w=CONTENT.writing, p=el("div","page");
  p.appendChild(secHead(w.stage,w.title,(w.essays.length+w.poems.length)+" pieces"));
  p.appendChild(el("p","sec-intro",esc(w.intro)));

  p.appendChild(subhead("Essays","The arguments"));
  w.essays.forEach(it=>{
    const e=el("article","essay");
    e.appendChild(el("div","meta-row",
      `<span class="code">${esc(it.code)}</span><span>${esc(it.context)}</span><span>${esc(it.year)}</span>${it.award?`<span class="award">${esc(it.award)}</span>`:""}`));
    e.appendChild(el("h3",null,(it.sample?sampleTag():"")+esc(it.title)));
    e.appendChild(el("p","excerpt",esc(it.excerpt)));
    if(it.full && it.full.trim()){
      const full=el("div","full",esc(it.full));
      const btn=el("button","readbtn","Read the essay");
      btn.addEventListener("click",()=>{ e.classList.toggle("open"); btn.textContent=e.classList.contains("open")?"Close":"Read the essay"; });
      e.appendChild(btn); e.appendChild(full);
    } else {
      e.appendChild(el("span","xonly","Excerpt only"));
    }
    p.appendChild(e);
  });

  p.appendChild(subhead("Poems","The music"));
  w.poems.forEach(it=>{
    const d=el("article","poem");
    d.appendChild(el("div","meta-row",
      `<span>${esc(it.code)} · ${esc(it.year)}</span><span class="venue">${esc(it.venue)}</span>`));
    d.appendChild(el("h3",null,(it.sample?sampleTag():"")+esc(it.title)));
    d.appendChild(el("div","verse",esc(it.text)));
    d.appendChild(el("div","scanmark","˘ ¯ ˘ ¯ ˘ ¯ ˘ ¯ ˘ ¯"));
    p.appendChild(d);
  });
  $view.appendChild(p);
}

/* ── pursuits ── */
function renderPursuits(){
  const pu=CONTENT.pursuits, p=el("div","page");
  p.appendChild(secHead(pu.stage,pu.title));
  p.appendChild(el("p","sec-intro",esc(pu.intro)));
  pu.items.forEach(it=>{
    const d=el("article","pursuit");
    const top=el("div","top");
    top.appendChild(el("h3",null,(it.sample?sampleTag():"")+esc(it.name)));
    top.appendChild(el("span","since",esc(it.since)));
    d.appendChild(top);
    d.appendChild(el("p","status",esc(it.status)));
    const sr=el("div","statrow");
    (it.stats||[]).forEach(s=>{ const b=el("div","stat"); b.appendChild(el("div","v",esc(s.v))); b.appendChild(el("div","k",esc(s.k))); sr.appendChild(b); });
    d.appendChild(sr);
    const tl=el("div","tl");
    (it.log||[]).forEach(li=>{ const t=el("div","tl-item"); t.appendChild(el("div","d",esc(li.d))); t.appendChild(el("div","t",esc(li.t))); tl.appendChild(t); });
    d.appendChild(tl);
    p.appendChild(d);
  });
  $view.appendChild(p);
}

/* ── contact ── */
function renderContact(){
  const c=CONTENT.contact, p=el("div","page");
  p.appendChild(secHead(c.stage,c.title));
  p.appendChild(el("p","contact-big",`${esc(c.big[0])}<br><em>${esc(c.big[1])}</em><br>${esc(c.big[2])}`));
  const rows=el("div","contact-rows");
  c.rows.forEach(r=>{
    const row=el("div","crow");
    row.appendChild(el("span","k",esc(r.k)));
    const a=el("a",null,esc(r.v)); a.href=r.url; a.rel="noopener"; row.appendChild(a);
    rows.appendChild(row);
  });
  p.appendChild(rows);
  $view.appendChild(p);
}

/* ── router ── */
const ROUTES={ home:renderCover, about:renderAbout, work:renderWork, writing:renderWriting, pursuits:renderPursuits, contact:renderContact };
function show(route){
  if(!ROUTES[route]) route="home";
  window.__roleTimer && clearInterval(window.__roleTimer);
  $view.innerHTML="";
  renderNav(route);
  ROUTES[route]();
  window.scrollTo(0,0);
}
function renderFooter(){
  const f=document.getElementById("footer-inner");
  f.appendChild(el("span",null,esc(CONTENT.footer.left)));
  f.appendChild(el("span",null,esc(CONTENT.footer.right)));
}
window.addEventListener("hashchange",()=>show(location.hash.slice(1)||"home"));
window.__go=show; // test hook
renderFooter();
show(location.hash.slice(1)||"home");
</script>
</body>
</html>
